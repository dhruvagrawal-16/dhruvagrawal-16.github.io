<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Dhruv Agrawal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #050508; --text: #eef0f4; --text-secondary: #8b92a5;
            --accent: #6c63ff; --accent-light: #8b83ff; --cyan: #00d4ff;
            --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08);
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .noise {
            position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat; background-size: 256px;
        }
        .blob {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.12;
            animation: blobFloat 15s ease-in-out infinite;
        }
        .blob-1 { width: 400px; height: 400px; background: var(--accent); top: -10%; left: 20%; }
        .blob-2 { width: 300px; height: 300px; background: var(--cyan); bottom: -5%; right: 15%; animation-delay: -5s; }
        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(40px, -30px); }
        }
        .content {
            text-align: center; position: relative; z-index: 2;
            max-width: 600px; padding: 40px;
        }
        .glitch-num {
            font-size: clamp(8rem, 20vw, 14rem);
            font-weight: 700; line-height: 1;
            background: linear-gradient(135deg, var(--accent-light), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            animation: glitchShake 3s ease-in-out infinite;
        }
        @keyframes glitchShake {
            0%, 100% { transform: translate(0); }
            10% { transform: translate(-2px, 1px); }
            20% { transform: translate(2px, -1px); }
            30% { transform: translate(0); }
        }
        .glitch-num::before, .glitch-num::after {
            content: '404'; position: absolute; left: 0; top: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--accent-light), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .glitch-num::before {
            animation: glitchBefore 2s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }
        .glitch-num::after {
            animation: glitchAfter 2s infinite;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }
        @keyframes glitchBefore {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-3px, 0); }
            40% { transform: translate(3px, 0); }
            60% { transform: translate(-1px, 0); }
        }
        @keyframes glitchAfter {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(3px, 0); }
            40% { transform: translate(-3px, 0); }
            60% { transform: translate(1px, 0); }
        }
        h2 {
            font-size: 1.5rem; margin: 24px 0 12px;
            font-weight: 600;
        }
        p {
            color: var(--text-secondary);
            font-size: 1.05rem; line-height: 1.6;
            margin-bottom: 32px;
        }
        .terminal {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem; text-align: left;
            margin-bottom: 32px; color: var(--text-secondary);
        }
        .terminal-line { margin-bottom: 6px; }
        .terminal-prompt { color: var(--accent-light); }
        .terminal-cursor {
            display: inline-block; width: 8px; height: 16px;
            background: var(--accent); vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .btn-home {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 32px;
            background: var(--accent); color: #fff;
            text-decoration: none; border-radius: 10px;
            font-weight: 600; font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 20px rgba(108,99,255,0.3);
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(108,99,255,0.4);
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="content">
        <div class="glitch-num">404</div>
        <h2>Page not found</h2>
        <p>Looks like this page got lost in a deployment. Even the best CI/CD pipelines have their off days.</p>
        <div class="terminal">
            <div class="terminal-line"><span class="terminal-prompt">$</span> sf org display --target-org this-page</div>
            <div class="terminal-line" style="color: #ff6b6b;">ERROR: The requested page does not exist.</div>
            <div class="terminal-line"><span class="terminal-prompt">$</span> navigate --home<span class="terminal-cursor"></span></div>
        </div>
        <a href="index.html" class="btn-home">
            ← Back to Home
        </a>
    </div>
</body>
</html>
