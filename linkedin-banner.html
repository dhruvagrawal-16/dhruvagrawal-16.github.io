<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkedIn Banner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .banner {
            width: 1584px;
            height: 396px;
            background: #f0f2f8;
            position: relative;
            overflow: hidden;
        }

        /* Soft mesh gradient */
        .sky {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 500px 300px at 20% 30%, rgba(99,102,241,0.12), transparent),
                radial-gradient(ellipse 400px 250px at 80% 25%, rgba(168,85,247,0.08), transparent),
                radial-gradient(ellipse 600px 200px at 50% 70%, rgba(14,165,233,0.06), transparent),
                radial-gradient(ellipse 300px 300px at 60% 40%, rgba(59,130,246,0.05), transparent);
        }

        /* 3D Perspective grid floor */
        .perspective-grid {
            position: absolute;
            bottom: -20px;
            left: -200px;
            right: -200px;
            height: 280px;
            background:
                linear-gradient(transparent 0%, rgba(99,102,241,0.04) 100%),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 79px,
                    rgba(99,102,241,0.1) 79px,
                    rgba(99,102,241,0.1) 80px
                );
            transform: perspective(400px) rotateX(55deg);
            transform-origin: center bottom;
            mask-image: linear-gradient(to top, black 20%, transparent 90%);
            -webkit-mask-image: linear-gradient(to top, black 20%, transparent 90%);
        }
        .perspective-grid::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 59px,
                rgba(99,102,241,0.08) 59px,
                rgba(99,102,241,0.08) 60px
            );
        }

        /* Horizon glow */
        .horizon-glow {
            position: absolute;
            bottom: 160px;
            left: 0; right: 0;
            height: 60px;
            background: radial-gradient(ellipse 70% 100% at 50% 100%, rgba(99,102,241,0.08), transparent);
        }

        /* 3D Cubes */
        .cube-wrap {
            position: absolute;
            transform-style: preserve-3d;
        }
        .cube {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }
        .cube-face {
            position: absolute;
            border: 1px solid;
        }

        .cw1 {
            width: 80px; height: 80px;
            right: 250px; top: 60px;
            transform: perspective(800px) rotateX(-20deg) rotateY(35deg);
        }
        .cw1 .front { width: 80px; height: 80px; border-color: rgba(99,102,241,0.18); background: rgba(99,102,241,0.04); transform: translateZ(40px); }
        .cw1 .back { width: 80px; height: 80px; border-color: rgba(99,102,241,0.08); transform: translateZ(-40px); }
        .cw1 .top { width: 80px; height: 80px; border-color: rgba(99,102,241,0.15); background: rgba(99,102,241,0.06); transform: rotateX(90deg) translateZ(40px); }
        .cw1 .right-f { width: 80px; height: 80px; border-color: rgba(99,102,241,0.12); background: rgba(99,102,241,0.03); transform: rotateY(90deg) translateZ(40px); }

        .cw2 {
            width: 50px; height: 50px;
            left: 200px; top: 80px;
            transform: perspective(800px) rotateX(-15deg) rotateY(-25deg);
        }
        .cw2 .front { width: 50px; height: 50px; border-color: rgba(168,85,247,0.18); background: rgba(168,85,247,0.04); transform: translateZ(25px); }
        .cw2 .back { width: 50px; height: 50px; border-color: rgba(168,85,247,0.08); transform: translateZ(-25px); }
        .cw2 .top { width: 50px; height: 50px; border-color: rgba(168,85,247,0.15); background: rgba(168,85,247,0.06); transform: rotateX(90deg) translateZ(25px); }
        .cw2 .right-f { width: 50px; height: 50px; border-color: rgba(168,85,247,0.12); background: rgba(168,85,247,0.03); transform: rotateY(90deg) translateZ(25px); }

        .cw3 {
            width: 35px; height: 35px;
            right: 500px; top: 130px;
            transform: perspective(800px) rotateX(-25deg) rotateY(45deg);
        }
        .cw3 .front { width: 35px; height: 35px; border-color: rgba(14,165,233,0.2); background: rgba(14,165,233,0.05); transform: translateZ(17px); }
        .cw3 .back { width: 35px; height: 35px; border-color: rgba(14,165,233,0.08); transform: translateZ(-17px); }
        .cw3 .top { width: 35px; height: 35px; border-color: rgba(14,165,233,0.15); background: rgba(14,165,233,0.06); transform: rotateX(90deg) translateZ(17px); }
        .cw3 .right-f { width: 35px; height: 35px; border-color: rgba(14,165,233,0.12); transform: rotateY(90deg) translateZ(17px); }

        .cw4 {
            width: 22px; height: 22px;
            left: 450px; top: 50px;
            transform: perspective(800px) rotateX(-30deg) rotateY(20deg);
        }
        .cw4 .front { width: 22px; height: 22px; border-color: rgba(59,130,246,0.2); background: rgba(59,130,246,0.05); transform: translateZ(11px); }
        .cw4 .top { width: 22px; height: 22px; border-color: rgba(59,130,246,0.15); background: rgba(59,130,246,0.06); transform: rotateX(90deg) translateZ(11px); }
        .cw4 .right-f { width: 22px; height: 22px; border-color: rgba(59,130,246,0.12); transform: rotateY(90deg) translateZ(11px); }

        /* 3D Rings */
        .ring3d { position: absolute; border-radius: 50%; border: 1px solid; }
        .ring1 {
            width: 180px; height: 180px;
            right: 100px; top: 30px;
            border-color: rgba(99,102,241,0.14);
            transform: perspective(600px) rotateX(60deg) rotateZ(15deg);
            box-shadow: 0 0 20px rgba(99,102,241,0.05);
        }
        .ring2 {
            width: 120px; height: 120px;
            left: 80px; top: 40px;
            border-color: rgba(168,85,247,0.1);
            transform: perspective(600px) rotateX(55deg) rotateZ(-10deg);
        }
        .ring3 {
            width: 90px; height: 90px;
            left: 700px; top: 20px;
            border-color: rgba(14,165,233,0.12);
            transform: perspective(600px) rotateX(65deg) rotateZ(25deg);
        }

        /* Glowing orbs */
        .orb { position: absolute; border-radius: 50%; }
        .orb1 { width: 6px; height: 6px; background: rgba(99,102,241,0.5); box-shadow: 0 0 12px rgba(99,102,241,0.25); top: 100px; left: 350px; }
        .orb2 { width: 4px; height: 4px; background: rgba(168,85,247,0.4); box-shadow: 0 0 10px rgba(168,85,247,0.2); top: 60px; right: 380px; }
        .orb3 { width: 5px; height: 5px; background: rgba(14,165,233,0.45); box-shadow: 0 0 12px rgba(14,165,233,0.2); top: 140px; left: 650px; }
        .orb4 { width: 3px; height: 3px; background: rgba(99,102,241,0.35); box-shadow: 0 0 8px rgba(99,102,241,0.15); top: 40px; left: 550px; }
        .orb5 { width: 4px; height: 4px; background: rgba(59,130,246,0.4); box-shadow: 0 0 10px rgba(59,130,246,0.15); top: 170px; right: 200px; }
        .orb6 { width: 3px; height: 3px; background: rgba(168,85,247,0.3); box-shadow: 0 0 8px rgba(168,85,247,0.15); top: 90px; left: 900px; }
        .orb7 { width: 5px; height: 5px; background: rgba(14,165,233,0.35); box-shadow: 0 0 12px rgba(14,165,233,0.15); top: 30px; left: 1100px; }
        .orb8 { width: 3px; height: 3px; background: rgba(99,102,241,0.4); box-shadow: 0 0 8px rgba(99,102,241,0.15); top: 160px; left: 1000px; }

        /* Bottom accent */
        .bottom-glow {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg,
                transparent 5%,
                rgba(99,102,241,0.4) 25%,
                rgba(14,165,233,0.5) 50%,
                rgba(168,85,247,0.4) 75%,
                transparent 95%
            );
        }

        .note {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-family: sans-serif;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="sky"></div>
        <div class="perspective-grid"></div>
        <div class="horizon-glow"></div>

        <div class="cube-wrap cw1"><div class="cube"><div class="cube-face front"></div><div class="cube-face back"></div><div class="cube-face top"></div><div class="cube-face right-f"></div></div></div>
        <div class="cube-wrap cw2"><div class="cube"><div class="cube-face front"></div><div class="cube-face back"></div><div class="cube-face top"></div><div class="cube-face right-f"></div></div></div>
        <div class="cube-wrap cw3"><div class="cube"><div class="cube-face front"></div><div class="cube-face back"></div><div class="cube-face top"></div><div class="cube-face right-f"></div></div></div>
        <div class="cube-wrap cw4"><div class="cube"><div class="cube-face front"></div><div class="cube-face top"></div><div class="cube-face right-f"></div></div></div>

        <div class="ring3d ring1"></div>
        <div class="ring3d ring2"></div>
        <div class="ring3d ring3"></div>

        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
        <div class="orb orb4"></div>
        <div class="orb orb5"></div>
        <div class="orb orb6"></div>
        <div class="orb orb7"></div>
        <div class="orb orb8"></div>

        <div class="bottom-glow"></div>
    </div>

    <div class="note">Screenshot the banner (1584×396) → Upload to LinkedIn</div>
</body>
</html>
