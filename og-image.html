<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OG Preview Card — Dhruv Agrawal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .card {
            width: 1200px;
            height: 630px;
            background: #0a0a1a;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 80px;
        }

        /* Mesh gradient background */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 600px 400px at 15% 50%, rgba(99,102,241,0.15), transparent),
                radial-gradient(ellipse 500px 350px at 85% 30%, rgba(168,85,247,0.10), transparent),
                radial-gradient(ellipse 400px 300px at 50% 80%, rgba(14,165,233,0.08), transparent);
        }

        /* Subtle grid */
        .grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 70%);
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 60px;
            width: 100%;
        }

        /* Photo */
        .photo-wrap {
            flex-shrink: 0;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(99,102,241,0.4), rgba(168,85,247,0.4));
            padding: 4px;
            box-shadow: 0 0 40px rgba(99,102,241,0.2), 0 0 80px rgba(99,102,241,0.1);
        }
        .photo-wrap img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }
        .photo-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e1e3a, #2a2a4a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            color: rgba(99,102,241,0.6);
            font-weight: 700;
        }

        /* Text */
        .text { flex: 1; }

        .name {
            font-size: 56px;
            font-weight: 700;
            color: #f0f0f8;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .title {
            font-size: 26px;
            font-weight: 500;
            color: rgba(99,102,241,0.9);
            margin-bottom: 8px;
        }

        .company {
            font-size: 20px;
            font-weight: 400;
            color: rgba(240,240,248,0.5);
            margin-bottom: 24px;
        }

        .tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tag {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(240,240,248,0.7);
            background: rgba(99,102,241,0.1);
            border: 1px solid rgba(99,102,241,0.2);
        }

        /* URL bar at bottom */
        .url-bar {
            position: absolute;
            bottom: 30px;
            left: 80px;
            right: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .url {
            font-size: 16px;
            color: rgba(240,240,248,0.3);
            font-family: 'Courier New', monospace;
        }
        .badge {
            font-size: 13px;
            color: rgba(240,240,248,0.25);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Accent line at top */
        .accent-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg,
                transparent 5%,
                rgba(99,102,241,0.6) 25%,
                rgba(14,165,233,0.7) 50%,
                rgba(168,85,247,0.6) 75%,
                transparent 95%
            );
        }

        .note {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-family: sans-serif;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="grid"></div>
        <div class="accent-line"></div>

        <div class="content">
            <div class="photo-wrap">
                <!-- Replace src with actual photo path if available -->
                <div class="photo-placeholder">DA</div>
            </div>
            <div class="text">
                <div class="name">Dhruv Agrawal</div>
                <div class="title">Senior Salesforce Developer</div>
                <div class="company">EPAM Systems · IIT Bhilai</div>
                <div class="tags">
                    <span class="tag">Apex</span>
                    <span class="tag">Lightning Web Components</span>
                    <span class="tag">Sales Cloud</span>
                    <span class="tag">Service Cloud</span>
                </div>
            </div>
        </div>

        <div class="url-bar">
            <span class="url">dhruvagrawal-16.github.io</span>
            <span class="badge">Portfolio</span>
        </div>
    </div>

    <div class="note">Screenshot this card at 1200×630 → use as og:image</div>
</body>
</html>
