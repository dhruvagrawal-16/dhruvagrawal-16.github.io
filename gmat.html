// --- LandingView ---
function LandingView({ attempts, activeSession, onSelectSection, onResume, onDiscard, sessions, bank, onQuestionHistory, onRetryWrong, onAnalytics, onSpacedRepetition, onWeakTopics }) {
  const sections = ['quant', 'verbal', 'data-insights'];
  const sectionColors = { quant: '#a855f7', verbal: '#0ea5e9', 'data-insights': '#14b8a6' };

  const wrongQuestions = useMemo(() => getWrongQuestions(sessions || [], bank), [sessions, bank]);
  const totalWrong = wrongQuestions.length;
  const streak = useMemo(() => computeStreak(sessions || []), [sessions]);
  const srDue = useMemo(() => getSpacedRepetitionDue(sessions || [], bank), [sessions, bank]);
  const totalSRDue = getTotalSRDue(srDue);
  const weakTopics = useMemo(() => getWeakTopics(sessions || [], bank), [sessions, bank]);
  const agg = useMemo(() => aggregateProgress(sessions || []), [sessions]);

  // Readiness score: 0-100, hard to fill — requires volume + accuracy + consistency
  const readiness = useMemo(() => {
    const totalPool = bank.length || 1;
    const attempted = new Set();
    (sessions || []).forEach(s => (s.answers || []).forEach(a => attempted.add(a.questionId)));
    const coverage = attempted.size / totalPool; // 0-1
    // Accuracy only counts meaningfully after 50+ questions
    const volumeWeight = Math.min(agg.totalQuestions / 200, 1); // ramps up over 200 Qs
    const acc = agg.totalQuestions > 0 ? agg.totalCorrect / agg.totalQuestions : 0;
    const accScore = acc * volumeWeight * 100;
    const streakScore = Math.min(streak.current / 14, 1) * 100; // 14-day streak = max
    const coverageScore = coverage * 100;
    return Math.round(coverageScore * 0.5 + accScore * 0.35 + streakScore * 0.15);
  }, [agg, streak, sessions, bank]);

  // Latest adaptive score per section
  const latestScore = useCallback((sec) => {
    const s = [...(sessions || [])].reverse().find(s => s.section === sec && s.isAdaptive);
    return s ? s.sectionScore : null;
  }, [sessions]);

  // Section accuracy for heatmap
  const sectionAccuracy = useCallback((sec, diff) => {
    let total = 0, correct = 0;
    (sessions || []).forEach(s => (s.answers || []).forEach(a => {
      const q = bank.find(x => x.id === a.questionId);
      if (q && q.section === sec && q.difficulty === diff) { total++; if (a.correct) correct++; }
    }));
    return total > 0 ? correct / total : -1; // -1 = no data
  }, [sessions, bank]);

  // Section progress — unique questions attempted / total
  const sectionProgress = useCallback((sec) => {
    const total = filterQuestions(bank, sec, null).length;
    if (!total) return 0;
    const attempted = new Set();
    (sessions || []).forEach(s => (s.answers || []).forEach(a => {
      const q = bank.find(x => x.id === a.questionId);
      if (q && q.section === sec) attempted.add(a.questionId);
    }));
    return attempted.size / total;
  }, [sessions, bank]);

  // Ring math
  const ringR = 80, ringC = 2 * Math.PI * ringR;
  const ringOffset = ringC - (readiness / 100) * ringC;

  // Animate on mount
  const [animated, setAnimated] = useState(false);
  useEffect(() => {
    const t = requestAnimationFrame(() => requestAnimationFrame(() => setAnimated(true)));
    return () => cancelAnimationFrame(t);
  }, []);

  // Staggered entrance
  const [entranceStage, setEntranceStage] = useState(0);
  useEffect(() => {
    const timers = [
      setTimeout(() => setEntranceStage(1), 100),   // ring
      setTimeout(() => setEntranceStage(2), 500),   // cards
      setTimeout(() => setEntranceStage(3), 900),   // toolbar
    ];
    return () => timers.forEach(clearTimeout);
  }, []);

  // Score counter animation
  const [displayScore, setDisplayScore] = useState(0);
  useEffect(() => {
    if (!animated) return;
    const target = readiness;
    const duration = 1200;
    const start = performance.now();
    const tick = (now) => {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
      setDisplayScore(Math.round(eased * target));
      if (progress < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [animated, readiness]);

  // Floating particles
  const particles = useMemo(() =>
    Array.from({length: 20}, (_, i) => ({
      id: i, left: Math.random() * 100, delay: Math.random() * 8,
      dur: 10 + Math.random() * 15, size: 1 + Math.random() * 2
    })), []);

  // Mini ring for mission cards
  const MiniRing = ({ progress, color }) => {
    const r = 14, c = 2 * Math.PI * r;
    return (
      <div className="cc-mini-ring">
        <svg viewBox="0 0 36 36">
          <circle className="ring-bg" cx="18" cy="18" r={r} />
          <circle className="ring-fill" cx="18" cy="18" r={r}
            style={{stroke:color,strokeDasharray:c,strokeDashoffset:c - progress * c}} />
        </svg>
      </div>
    );
  };

  // Heatmap bar for difficulty accuracy
  const HeatBar = ({ sec }) => {
    const diffs = ['easy','medium','hard'];
    const colors = (acc) => acc < 0 ? 'rgba(255,255,255,.06)' : acc >= .7 ? 'var(--green)' : acc >= .4 ? '#fbbf24' : 'var(--warm)';
    return (
      <div className="cc-heatmap">
        {diffs.map(d => {
          const acc = sectionAccuracy(sec, d);
          return <div key={d} className="cc-heat-seg" style={{background:colors(acc),opacity:acc<0?.3:(.4+acc*.6)}} title={`${d}: ${acc<0?'—':(acc*100).toFixed(0)+'%'}`} />;
        })}
      </div>
    );
  };

  return (
    <div>
      {/* Floating Particles */}
      <div className="cc-particles">
        {particles.map(p => <div key={p.id} className="cc-particle-dot" style={{
          left: p.left+'%', bottom: '-10px', width: p.size, height: p.size,
          animationDuration: p.dur+'s', animationDelay: p.delay+'s'
        }} />)}
      </div>

      {/* Hero */}
      <div className={`cc-hero cc-entrance${entranceStage >= 1 ? ' visible' : ''}`}>
        <h1>GMAT Practice {streak.current > 0 && <span className="cc-flame">🔥{streak.current}</span>}</h1>
        <div className="cc-sub">Focus Edition</div>

        {/* Readiness Ring */}
        <div className={`cc-ring-wrap${animated ? ' animated' : ''}`} style={{'--ring-c':ringC,'--ring-offset':ringOffset}}>
          <div className="cc-ring-glow" />
          <div className="cc-ring-pulse" /><div className="cc-ring-pulse" /><div className="cc-ring-pulse" />
          <div className="cc-ring-orbit"><div className="cc-ring-particle" /></div>
          <svg className="cc-ring-svg" viewBox="0 0 190 190">
            <circle className="cc-ring-track" cx="95" cy="95" r={ringR} />
            <circle className="cc-ring-bg" cx="95" cy="95" r={ringR} />
            <circle className="cc-ring-fill" cx="95" cy="95" r={ringR}
              style={{stroke:'url(#ringGrad)',strokeDasharray:ringC,strokeDashoffset:animated ? ringOffset : ringC}} />
            <defs>
              <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#6c63ff" />
                <stop offset="50%" stopColor="#00d4ff" />
                <stop offset="100%" stopColor="#00e88f" />
              </linearGradient>
            </defs>
          </svg>
          <div className="cc-ring-center">
            <div className="cc-ring-score">{displayScore}</div>
            <div className="cc-ring-label">Readiness</div>
          </div>
        </div>
        <div style={{fontSize:'.72rem',color:'var(--text-s)'}}>{agg.totalQuestions} Qs · {agg.totalQuestions > 0 ? ((agg.totalCorrect/agg.totalQuestions)*100).toFixed(0) : 0}% acc · {(sessions||[]).length} sessions</div>
      </div>

      {activeSession && (
        <div className="resume-banner">
          <p>📝 Active {SECTION_NAMES[activeSession.section]} session ({activeSession.currentIndex}/{activeSession.isAdaptive ? activeSession.totalTarget : activeSession.questionIds.length}{activeSession.isAdaptive ? ' · Adaptive' : ''})</p>
          <div style={{display:'flex',gap:'8px'}}>
            <button className="resume-btn" onClick={onResume}>Resume</button>
            <button className="discard-btn" onClick={onDiscard}>Discard</button>
          </div>
        </div>
      )}

      {/* Mission Cards */}
      <div className={`cc-missions cc-entrance${entranceStage >= 2 ? ' visible' : ''}`}>
        {sections.map((sec, i) => {
          const total = filterQuestions(bank, sec, null).length;
          const score = latestScore(sec);
          const prog = sectionProgress(sec);
          return (
            <div key={sec} className={`cc-mission${animated ? ' animated' : ''}`} data-section={sec} onClick={() => onSelectSection(sec)}
              role="button" tabIndex={0} onKeyDown={e => { if (e.key === 'Enter') onSelectSection(sec); }}
              style={{'--prog': `${prog*100}%`}}>
              <div className="cc-mission-head">
                <span className="cc-mission-icon">{SECTION_ICONS[sec]}</span>
                <div className="cc-mission-stat">
                  {score ? (
                    <>
                      <span className="cc-mission-score">{score}</span>
                      <span className="cc-mission-score-label">/90</span>
                    </>
                  ) : (
                    <span className="cc-mission-new">NEW</span>
                  )}
                </div>
              </div>
              <h3>{SECTION_NAMES[sec]}</h3>
              <div style={{fontSize:'.72rem',color:'var(--text-s)'}}>{total} questions · {(prog*100).toFixed(0)}% explored</div>
              <div className="cc-progress-bar">
                <div className="cc-progress-fill" />
              </div>
            </div>
          );
        })}
      </div>

      {/* Action Toolbar */}
      <div className={`cc-toolbar cc-entrance${entranceStage >= 3 ? ' visible' : ''}`}>
        <div className="cc-tool" onClick={onAnalytics} role="button" tabIndex={0}>
          📊<span className="cc-tool-label">Analytics</span>
        </div>
        <div className="cc-tool" onClick={onQuestionHistory} role="button" tabIndex={0}>
          📋<span className="cc-tool-label">History</span>
        </div>
        {totalSRDue > 0 && (
          <div className="cc-tool" onClick={onSpacedRepetition} role="button" tabIndex={0}>
            🧠<span className="cc-tool-badge">{totalSRDue}</span><span className="cc-tool-label">Review</span>
          </div>
        )}
        {totalWrong > 0 && (
          <div className="cc-tool" onClick={onRetryWrong} role="button" tabIndex={0}>
            🔄<span className="cc-tool-badge">{totalWrong}</span><span className="cc-tool-label">Retry</span>
          </div>
        )}
        {weakTopics.length > 0 && (
          <div className="cc-tool" onClick={onWeakTopics} role="button" tabIndex={0}>
            🎯<span className="cc-tool-badge">{weakTopics.filter(t=>t.accuracy<60).length}</span><span className="cc-tool-label">Weak Areas</span>
          </div>
        )}
      </div>
    </div>
  );
}

// --- SessionConfigView ---
function SessionConfigView({ section, attempts, onBack, onStart }) {
  const [difficulty, setDifficulty] = useState('adaptive');
  const [count, setCount] = useState(10);
  const [customInput, setCustomInput] = useState('');
  const [useCustom, setUseCustom] = useState(false);

  const bank = typeof GMAT_QUESTIONS !== 'undefined' ? GMAT_QUESTIONS : [];
  const isAdaptive = difficulty === 'adaptive';
  const unattempted = getUnattemptedCount(bank, section, isAdaptive ? null : difficulty, attempts);
  const actualCount = useCustom ? (parseInt(customInput, 10) || 0) : count;
  const isValid = validateSessionConfig(actualCount);
  const isInsufficient = isValid && unattempted < actualCount && unattempted > 0;
  const isNone = unattempted === 0;

  const handleStart = () => {
    if (!isValid || isNone) return;
    const c = isInsufficient ? unattempted : actualCount;
    onStart(section, difficulty, c);
  };

  const handleReset = () => {
    const key = isAdaptive ? section : (difficulty ? `${section}:${difficulty}` : section);
    attempts[key] = [];
    if (isAdaptive) { ['easy','medium','hard'].forEach(d => { attempts[`${section}:${d}`] = []; }); }
    saveJSON('gmat-attempts', attempts);
    setCount(count); // force re-render
  };

  const diffs = [
    { label: '🎯 Adaptive', value: 'adaptive' },
    { label: 'Easy', value: 'easy' },
    { label: 'Medium', value: 'medium' },
    { label: 'Hard', value: 'hard' }
  ];

  return (
    <div>
      <button className="config-back" onClick={onBack}>← Back to sections</button>
      <div className="hub-title" style={{marginBottom:'24px'}}>
        <h1>{SECTION_ICONS[section]} {SECTION_NAMES[section]}</h1>
      </div>

      <div className="card">
        <div className="config-section">
          <h3>Difficulty</h3>
          <div className="toggle-wrap">
            {diffs.map(d => (
              <button key={d.label} className={`toggle-btn${difficulty === d.value ? ' active' : ''}`}
                onClick={() => setDifficulty(d.value)}>{d.label}</button>
            ))}
          </div>
        </div>

        <div className="config-section">
          <h3>Number of Questions</h3>
          <div className="presets">
            {[10, 20].map(n => (
              <button key={n} className={`preset-btn${!useCustom && count === n ? ' active' : ''}`}
                onClick={() => { setUseCustom(false); setCount(n); }}>{n}</button>
            ))}
            <button className={`preset-btn${useCustom ? ' active' : ''}`}
              onClick={() => setUseCustom(true)}>Custom</button>
          </div>
          {useCustom && (
            <input type="number" className="count-input" min="1" max="50" placeholder="1-50"
              value={customInput} onChange={e => setCustomInput(e.target.value)} />
          )}
        </div>

        <div className={`unattempted-info${isInsufficient || isNone ? ' warning' : ''}`}>
          {isNone
            ? <>All questions attempted for this combination. <button className="preset-btn" style={{marginLeft:'8px'}} onClick={handleReset}>Reset Attempts</button></>
            : isInsufficient
              ? <>Only {unattempted} unattempted questions available (requested {actualCount}).
                  <div className="warning-actions">
                    <button className="shorter-btn" onClick={() => { setUseCustom(false); setCount(unattempted); }}>Start with {unattempted}</button>
                    <button className="reset-btn" onClick={handleReset}>Reset Attempts</button>
                  </div>
                </>
              : <>{unattempted} unattempted questions available</>
          }
        </div>

        {isAdaptive && (
          <div className="note" style={{marginBottom:'0'}}>
            🎯 <strong>Adaptive mode:</strong> Questions start at medium difficulty and adjust based on your performance — just like the real GMAT. You'll receive an estimated section score (60–90) and percentile at the end.
          </div>
        )}

        <button className="calc-btn" disabled={!isValid || isNone} onClick={handleStart}>
          {isAdaptive ? `Start Adaptive Session (${isInsufficient ? unattempted : actualCount} questions)` : `Start Session (${isInsufficient ? unattempted : actualCount} questions)`}
        </button>
      </div>
    </div>
  );
}

// --- QuestionView ---
function QuestionView({ session, bank, onAnswer, onComplete, onPause }) {
  const { section, questionIds, currentIndex, answers } = session;
  const questionId = questionIds[currentIndex];
  const question = bank.find(q => q.id === questionId);
  const timerLimit = getTimerDuration(question ? question.section : section, question ? question.subsection : null);

  const [selected, setSelected] = useState(null);
  const [slidingOut, setSlidingOut] = useState(false);
  const [runningStats, setRunningStats] = useState(null);
  const endTimeRef = useRef(Date.now() + timerLimit * 1000);
  const [remaining, setRemaining] = useState(timerLimit);
  const intervalRef = useRef(null);
  const hasTimedOut = useRef(false);

  // Reset selection when question changes
  useEffect(() => {
    setSelected(null);
    setSlidingOut(false);
    hasTimedOut.current = false;
  }, [currentIndex]);

  // Auto-hide running stats
  useEffect(() => {
    if (runningStats) {
      const t = setTimeout(() => setRunningStats(null), 2500);
      return () => clearTimeout(t);
    }
  }, [runningStats]);

  const doSubmit = useCallback((answerId) => {
    clearInterval(intervalRef.current);
    const timeTaken = computeTimeTaken(timerLimit, Math.ceil((endTimeRef.current - Date.now()) / 1000));
    const correct = answerId !== null ? evaluateAnswer(question, answerId).correct : false;
    const answerRecord = { questionId: question.id, selectedAnswer: answerId, correct, timeTaken };
    const totalTarget = session.isAdaptive ? session.totalTarget : questionIds.length;
    const isLast = (answers.length + 1) >= totalTarget;

    // Show running stats
    const prevCorrect = answers.filter(a => a.correct).length + (correct ? 1 : 0);
    const prevTotal = answers.length + 1;
    const avgTime = [...answers.map(a => a.timeTaken || 0), timeTaken];
    const avg = avgTime.reduce((a, b) => a + b, 0) / avgTime.length;
    setRunningStats({ correct: prevCorrect, total: prevTotal, avgTime: Math.round(avg) });

    onAnswer(answerRecord, isLast);
  }, [question, currentIndex, questionIds, timerLimit, onAnswer, answers]);

  // Timer logic with Date.now() for drift protection
  useEffect(() => {
    endTimeRef.current = Date.now() + timerLimit * 1000;
    setRemaining(timerLimit);
    hasTimedOut.current = false;

    const tick = () => {
      const left = Math.ceil((endTimeRef.current - Date.now()) / 1000);
      setRemaining(left);
    };

    intervalRef.current = setInterval(tick, 250);
    return () => clearInterval(intervalRef.current);
  }, [currentIndex, timerLimit]);

  // Timer is informational only — no auto-submit on timeout
  useEffect(() => {
    if (remaining <= 0 && !hasTimedOut.current) {
      hasTimedOut.current = true; // mark as overtime for styling
    }
  }, [remaining]);

  // Visibility change handler for background tabs
  useEffect(() => {
    const handleVisibility = () => {
      if (!document.hidden) {
        const left = Math.ceil((endTimeRef.current - Date.now()) / 1000);
        setRemaining(left);
      }
    };
    document.addEventListener('visibilitychange', handleVisibility);
    return () => document.removeEventListener('visibilitychange', handleVisibility);
  }, []);

  // Keyboard navigation
  useEffect(() => {
    const handleKey = (e) => {
      if (!question) return;
      // 1-5 keys
      if (e.key >= '1' && e.key <= '5') {
        const idx = parseInt(e.key) - 1;
        if (idx < question.choices.length) setSelected(question.choices[idx].id);
      }
      // A-E keys
      const letter = e.key.toUpperCase();
      if (letter >= 'A' && letter <= 'E') {
        const choice = question.choices.find(c => c.id === letter);
        if (choice) setSelected(choice.id);
      }
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [question]);

  const handleNext = useCallback(() => {
    if (!selected || slidingOut) return;
    setSlidingOut(true);
    setTimeout(() => doSubmit(selected), 200);
  }, [selected, doSubmit, slidingOut]);

  // Enter key for advancing
  useEffect(() => {
    const handleEnter = (e) => {
      if (e.key === 'Enter' && selected) {
        handleNext();
      }
    };
    window.addEventListener('keydown', handleEnter);
    return () => window.removeEventListener('keydown', handleEnter);
  }, [selected, handleNext]);

  const handlePause = useCallback(() => {
    clearInterval(intervalRef.current);
    const left = Math.ceil((endTimeRef.current - Date.now()) / 1000);
    onPause(left);
  }, [onPause]);

  if (!question) return <div className="container"><p>Question not found.</p></div>;

  const totalDisplay = session.isAdaptive ? session.totalTarget : questionIds.length;
  const { questionNumber, progressFraction } = getProgressIndicators(currentIndex, totalDisplay);
  const timerColor = getTimerColor(remaining);

  return (
    <div>
      <div className="question-header">
        <span className="question-num">Question {questionNumber} of {totalDisplay}</span>
        <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <button className="pause-btn" onClick={handlePause}>⏸ Pause</button>
          <span className={`timer-display ${timerColor}`}>{formatTime(remaining)}</span>
        </div>
      </div>

      <div className="progress-bar-wrap">
        <div className="progress-bar-fill" style={{width: `${(currentIndex / totalDisplay) * 100}%`}} />
      </div>

      <div key={question.id} className={`question-fade${slidingOut ? ' slide-out' : ''}`}>
      <span className={`difficulty-badge ${question.difficulty}`}>{question.difficulty}</span>
      {question.subsection === 'rc' && <span className="difficulty-badge" style={{background:'#6366f1',marginLeft:4}}>RC</span>}
      {question.subsection === 'cr' && <span className="difficulty-badge" style={{background:'#0891b2',marginLeft:4}}>CR</span>}

      {question.passage ? (() => {
        const bank = typeof GMAT_QUESTIONS !== 'undefined' ? GMAT_QUESTIONS : [];
        const groupQs = questionIds.filter(id => { const q = bank.find(x => x.id === id); return q && q.passageGroup === question.passageGroup; });
        const posInGroup = groupQs.indexOf(question.id) + 1;
        return (
          <div className="rc-split-layout">
            <div className="rc-passage-panel">
              <div className="rc-passage-header">
                <span className="rc-passage-label">Reading Passage</span>
                <span className="rc-passage-meta">Question {posInGroup} of {groupQs.length} for this passage</span>
              </div>
              <div className="rc-passage-scroll">
                <div className="rc-passage-text" dangerouslySetInnerHTML={{__html: question.passage}} />
              </div>
            </div>
            <div className="rc-question-side">
              <div className="question-prompt" dangerouslySetInnerHTML={{__html: question.prompt}} />
              <div className="choices-list">
                {question.choices.map((c, i) => (
                  <button key={c.id}
                    className={`choice-btn${selected === c.id ? ' selected' : ''}`}
                    onClick={() => setSelected(c.id)}>
                    <span className="choice-id">{c.id}</span>
                    <span dangerouslySetInnerHTML={{__html: c.text}} />
                    <span className="kb-hint">{c.id}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      })() : (
        <React.Fragment>
          <div className="question-prompt" dangerouslySetInnerHTML={{__html: question.prompt}} />
          <div className="choices-list">
            {question.choices.map((c, i) => (
              <button key={c.id}
                className={`choice-btn${selected === c.id ? ' selected' : ''}`}
                onClick={() => setSelected(c.id)}>
                <span className="choice-id">{c.id}</span>
                <span dangerouslySetInnerHTML={{__html: c.text}} />
                <span className="kb-hint">{c.id}</span>
              </button>
            ))}
          </div>
        </React.Fragment>
      )}
      </div>

      <div className="nav-row">
        <button className="next-btn" disabled={!selected || slidingOut} onClick={handleNext}>
          {(answers.length + 1) >= totalDisplay ? 'Finish Session' : 'Next Question →'}
        </button>
      </div>

      {runningStats && (
        <div className="running-stats" key={runningStats.total}>
          <span className="rs-correct">{runningStats.correct}/{runningStats.total}</span>
          <span className="rs-sep">|</span>
          <span>{((runningStats.correct / runningStats.total) * 100).toFixed(0)}%</span>
          <span className="rs-sep">|</span>
          <span>avg {formatTime(runningStats.avgTime)}</span>
        </div>
      )}
    </div>
  );
}

// --- AnalyticsView ---
function AnalyticsView({ sessions, bank, onBack }) {
  const allAnswers = [];
  sessions.forEach(s => {
    if (!s.answers) return;
    s.answers.forEach(a => {
      const q = bank.find(x => x.id === a.questionId);
      if (q) allAnswers.push({ ...a, section: q.section, subsection: q.subsection, difficulty: q.difficulty });
    });
  });

  // By section
  const bySection = {};
  allAnswers.forEach(a => {
    const key = a.section;
    if (!bySection[key]) bySection[key] = { total: 0, correct: 0 };
    bySection[key].total++;
    if (a.correct) bySection[key].correct++;
  });

  // By difficulty
  const byDiff = {};
  allAnswers.forEach(a => {
    if (!byDiff[a.difficulty]) byDiff[a.difficulty] = { total: 0, correct: 0 };
    byDiff[a.difficulty].total++;
    if (a.correct) byDiff[a.difficulty].correct++;
  });

  // Last 10 sessions
  const recent = sessions.slice(-10).map(s => {
    const total = s.answers ? s.answers.length : 0;
    const correct = s.answers ? s.answers.filter(a => a.correct).length : 0;
    return { accuracy: total > 0 ? (correct / total) * 100 : 0, date: s.completedAt ? new Date(s.completedAt).toLocaleDateString(undefined, {month:'short',day:'numeric'}) : '' };
  });

  const sectionColors = { 'quant': '#00e88f', 'verbal': '#6c63ff', 'data-insights': '#00d4ff' };
  const diffColors = { 'easy': '#00e88f', 'medium': '#00d4ff', 'hard': '#ff6b6b' };

  return (
    <div>
      <div className="hub-title" style={{marginBottom:'24px'}}>
        <h1>📊 Performance Analytics</h1>
        <p>{allAnswers.length} questions attempted across {sessions.length} sessions</p>
      </div>

      <div className="analytics-card">
        <div className="card-title">Accuracy by Section</div>
        {Object.entries(bySection).map(([sec, data]) => {
          const pct = data.total > 0 ? (data.correct / data.total) * 100 : 0;
          return (
            <div key={sec} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span className="analytics-label">{SECTION_NAMES[sec] || sec}</span>
                <span className="analytics-label">{pct.toFixed(0)}% ({data.correct}/{data.total})</span>
              </div>
              <div className="analytics-bar">
                <div className="analytics-fill" style={{width: pct + '%', background: sectionColors[sec] || '#6c63ff'}} />
              </div>
            </div>
          );
        })}
      </div>

      <div className="analytics-card">
        <div className="card-title">Accuracy by Difficulty</div>
        {['easy','medium','hard'].map(diff => {
          const data = byDiff[diff] || { total: 0, correct: 0 };
          const pct = data.total > 0 ? (data.correct / data.total) * 100 : 0;
          return (
            <div key={diff} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span className="analytics-label" style={{textTransform:'capitalize'}}>{diff}</span>
                <span className="analytics-label">{pct.toFixed(0)}% ({data.correct}/{data.total})</span>
              </div>
              <div className="analytics-bar">
                <div className="analytics-fill" style={{width: pct + '%', background: diffColors[diff]}} />
              </div>
            </div>
          );
        })}
      </div>

      {recent.length > 0 && (
        <div className="analytics-card">
          <div className="card-title">Last {recent.length} Sessions</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:6,height:120,marginTop:12}}>
            {recent.map((s, i) => (
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <span style={{fontSize:'.65rem',color:'var(--text-s)'}}>{s.accuracy.toFixed(0)}%</span>
                <div style={{width:'100%',borderRadius:4,background: s.accuracy >= 80 ? 'var(--green)' : s.accuracy >= 50 ? 'var(--cyan)' : 'var(--warm)',
                  height: Math.max(4, (s.accuracy / 100) * 100), transition:'height .5s ease'}} />
                <span style={{fontSize:'.55rem',color:'var(--text-s)'}}>{s.date}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <button className="calc-btn" onClick={onBack} style={{marginTop:'8px'}}>← Back</button>
    </div>
  );
}
// --- QuestionHistoryView ---
function QuestionHistoryView({ sessions, bank, onBack, onRetryWrong }) {
  const [sectionFilter, setSectionFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('all');
  const [expandedId, setExpandedId] = useState(null);

  const allItems = useMemo(() => {
    const items = [];
    const bankMap = {};
    bank.forEach(q => { bankMap[q.id] = q; });

    sessions.forEach((sess, sIdx) => {
      if (!sess.answers) return;
      sess.answers.forEach(a => {
        const q = bankMap[a.questionId];
        if (!q) return;
        const marker = a.selectedAnswer === null ? 'unanswered' : a.correct ? 'correct' : 'incorrect';
        items.push({
          key: `${sess.id}_${a.questionId}`,
          questionId: a.questionId,
          prompt: q.prompt,
          passage: q.passage || null,
          choices: q.choices,
          selectedAnswer: a.selectedAnswer,
          correctAnswer: q.correctAnswer,
          explanation: q.explanation,
          section: q.section,
          subsection: q.subsection || null,
          difficulty: q.difficulty,
          timeTaken: a.timeTaken || 0,
          marker,
          sessionLabel: `Session #${sIdx + 1}`,
          sessionDate: sess.completedAt ? new Date(sess.completedAt).toLocaleDateString(undefined, { month:'short', day:'numeric' }) : ''
        });
      });
    });
    return items;
  }, [sessions, bank]);

  const filtered = useMemo(() => {
    return allItems.filter(item => {
      if (sectionFilter !== 'all' && item.section !== sectionFilter) return false;
      if (statusFilter !== 'all' && item.marker !== statusFilter) return false;
      return true;
    });
  }, [allItems, sectionFilter, statusFilter]);

  const stats = useMemo(() => {
    const total = allItems.length;
    const correct = allItems.filter(i => i.marker === 'correct').length;
    const incorrect = allItems.filter(i => i.marker === 'incorrect').length;
    const unanswered = allItems.filter(i => i.marker === 'unanswered').length;
    return {
      total,
      correctPct: total > 0 ? ((correct / total) * 100).toFixed(1) : '0.0',
      incorrectPct: total > 0 ? ((incorrect / total) * 100).toFixed(1) : '0.0',
      unansweredPct: total > 0 ? ((unanswered / total) * 100).toFixed(1) : '0.0'
    };
  }, [allItems]);

  if (allItems.length === 0) {
    return (
      <div>
        <button className="config-back" onClick={onBack}>← Back</button>
        <div className="empty-state">
          <div className="empty-icon">📋</div>
          <p>No question history yet</p>
          <p className="empty-sub">Complete a practice session to see your history here.</p>
        </div>
      </div>
    );
  }

  const sectionTabs = [
    { label: 'All', value: 'all' },
    { label: 'Quant', value: 'quant' },
    { label: 'Verbal', value: 'verbal' },
    { label: 'Data Insights', value: 'data-insights' }
  ];
  const statusTabs = [
    { label: 'All', value: 'all' },
    { label: 'Correct', value: 'correct' },
    { label: 'Incorrect', value: 'incorrect' },
    { label: 'Unanswered', value: 'unanswered' }
  ];

  return (
    <div>
      <button className="config-back" onClick={onBack}>← Back</button>
      <div className="hub-title" style={{marginBottom:'24px'}}>
        <h1>Question History</h1>
        <p>All attempted questions across sessions</p>
      </div>

      <div className="qh-summary-row">
        <div className="qh-stat">
          <div className="qh-stat-val">{stats.total}</div>
          <div className="qh-stat-label">Attempted</div>
        </div>
        <div className="qh-stat">
          <div className="qh-stat-val" style={{color:'var(--green)'}}>{stats.correctPct}%</div>
          <div className="qh-stat-label">Correct</div>
        </div>
        <div className="qh-stat">
          <div className="qh-stat-val" style={{color:'var(--warm)'}}>{stats.incorrectPct}%</div>
          <div className="qh-stat-label">Incorrect</div>
        </div>
        <div className="qh-stat">
          <div className="qh-stat-val" style={{color:'var(--text-s)'}}>{stats.unansweredPct}%</div>
          <div className="qh-stat-label">Unanswered</div>
        </div>
      </div>

      <div style={{marginBottom:'12px'}}>
        <div style={{fontSize:'.75rem',color:'var(--text-s)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'8px',fontWeight:500}}>Section</div>
        <div className="qh-tabs">
          {sectionTabs.map(t => (
            <button key={t.value} className={`qh-tab${sectionFilter === t.value ? ' active' : ''}`}
              onClick={() => setSectionFilter(t.value)}>{t.label}</button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:'20px'}}>
        <div style={{fontSize:'.75rem',color:'var(--text-s)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'8px',fontWeight:500}}>Status</div>
        <div className="qh-tabs">
          {statusTabs.map(t => (
            <button key={t.value} className={`qh-tab${statusFilter === t.value ? ' active' : ''}`}
              onClick={() => setStatusFilter(t.value)}>{t.label}</button>
          ))}
        </div>
      </div>

      {onRetryWrong && (
        <button className="calc-btn" onClick={onRetryWrong}
          style={{marginBottom:'20px',background:'var(--warm)',boxShadow:'0 4px 24px rgba(255,107,107,.3)'}}>
          🔄 Practice Wrong Questions
        </button>
      )}

      <div style={{fontSize:'.82rem',color:'var(--text-s)',marginBottom:'12px'}}>{filtered.length} question{filtered.length !== 1 ? 's' : ''}</div>

      {filtered.map(item => {
        const isExpanded = expandedId === item.key;
        const plainPrompt = item.prompt.replace(/<[^>]*>/g, '');
        const truncPrompt = plainPrompt.length > 80 ? plainPrompt.slice(0, 80) + '…' : plainPrompt;
        const statusChar = item.marker === 'correct' ? '✓' : item.marker === 'incorrect' ? '✗' : '—';

        return (
          <div key={item.key} className={`qh-item${isExpanded ? ' expanded' : ''}`}
            onClick={() => setExpandedId(isExpanded ? null : item.key)}>
            <div className="qh-item-row">
              <span className={`qh-status ${item.marker}`}>{statusChar}</span>
              <span className="qh-item-prompt">{truncPrompt}</span>
              <div className="qh-item-meta">
                <span className={`difficulty-badge ${item.difficulty}`} style={{marginBottom:0}}>{item.difficulty}</span>
                <span style={{fontSize:'.75rem',color:'var(--text-s)'}}>{formatTime(item.timeTaken)}</span>
                <span style={{fontSize:'.72rem',color:'var(--text-s)',opacity:.7}}>{item.sessionDate}</span>
              </div>
            </div>

            {isExpanded && (
              <div className="qh-detail">
                {item.passage && (
                  <div className="rc-passage-panel" style={{marginBottom:16,maxHeight:'200px'}}>
                    <div className="rc-passage-header">
                      <span className="rc-passage-label">Reading Passage</span>
                    </div>
                    <div className="rc-passage-scroll" style={{maxHeight:'160px'}}>
                      <div className="rc-passage-text" dangerouslySetInnerHTML={{__html: item.passage}} />
                    </div>
                  </div>
                )}
                <div className="qh-detail-prompt" dangerouslySetInnerHTML={{__html: item.prompt}} />
                <div className="review-choices" style={{marginBottom:'14px'}}>
                  {item.choices.map(c => {
                    const isCorrect = c.id === item.correctAnswer;
                    const isSelected = c.id === item.selectedAnswer;
                    let cls = 'review-choice';
                    if (isSelected && isCorrect) cls += ' is-selected-correct';
                    else if (isSelected && !isCorrect) cls += ' is-selected-incorrect';
                    else if (isCorrect) cls += ' is-correct';
                    return (
                      <div key={c.id} className={cls}>
                        <span className="choice-id">{c.id}</span>
                        <span style={{flex:1}} dangerouslySetInnerHTML={{__html: c.text}} />
                        {isSelected && isCorrect && <span style={{fontSize:'.78rem',color:'var(--green)',fontWeight:600}}>Your answer ✓</span>}
                        {isSelected && !isCorrect && <span style={{fontSize:'.78rem',color:'var(--warm)',fontWeight:600}}>Your answer ✗</span>}
                        {!isSelected && isCorrect && <span style={{fontSize:'.78rem',color:'var(--green)',fontWeight:600}}>Correct answer</span>}
                      </div>
                    );
                  })}
                </div>
                <div className="review-meta" style={{marginBottom:'10px'}}>
                  <span>📚 {SECTION_NAMES[item.section] || item.section}</span>
                  <span>⏱ {formatTime(item.timeTaken)}</span>
                  <span>📁 {item.sessionLabel}</span>
                </div>
                <div className="review-explanation">
                  <strong>Explanation</strong>
                  <span dangerouslySetInnerHTML={{__html: item.explanation}} />
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// --- GmatApp (Root) ---
function GmatApp() {
  const [view, setView] = useState('landing');
  const [theme, setTheme] = useState(() => loadJSON('gmat-theme', 'dark'));
  const [sessions, setSessions] = useState(() => loadJSON('gmat-sessions', []));
  const [attempts, setAttempts] = useState(() => loadJSON('gmat-attempts', {}));
  const [activeSession, setActiveSession] = useState(() => loadJSON('gmat-active-session', null));
  const [selectedSection, setSelectedSection] = useState(null);
  const [completedSession, setCompletedSession] = useState(null);
  const [pausedRemaining, setPausedRemaining] = useState(0);
  const [showClearConfirm, setShowClearConfirm] = useState(false);
  const [showRestoreBanner, setShowRestoreBanner] = useState(false);
  const [pendingBackup, setPendingBackup] = useState(null);
  const [toastMsg, setToastMsg] = useState(null);

  const bank = useMemo(() => {
    if (typeof GMAT_QUESTIONS === 'undefined' || !Array.isArray(GMAT_QUESTIONS)) return [];
    return GMAT_QUESTIONS.filter(validateQuestion);
  }, []);

  // Check for IDB backup if localStorage is empty
  useEffect(() => {
    checkAndRestore().then(function(backup) {
      if (backup) {
        setPendingBackup(backup);
        setShowRestoreBanner(true);
      }
    }).catch(function() {});
  }, []);

  const handleRestore = useCallback(() => {
    if (!pendingBackup) return;
    BACKUP_KEYS.forEach(k => {
      if (pendingBackup[k]) localStorage.setItem(k, pendingBackup[k]);
    });
    setSessions(loadJSON('gmat-sessions', []));
    setAttempts(loadJSON('gmat-attempts', {}));
    setActiveSession(loadJSON('gmat-active-session', null));
    setTheme(loadJSON('gmat-theme', 'dark'));
    setShowRestoreBanner(false);
    setPendingBackup(null);
  }, [pendingBackup]);

  // Apply theme
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    saveJSON('gmat-theme', theme);
  }, [theme]);

  // Apply section accent color during quiz
  useEffect(() => {
    if (view === 'question' && activeSession) {
      document.documentElement.setAttribute('data-section', activeSession.section);
    } else {
      document.documentElement.removeAttribute('data-section');
    }
  }, [view, activeSession]);

  // Prune stale IDs from attempt tracker on mount
  useEffect(() => {
    const validIds = new Set(bank.map(q => q.id));
    let changed = false;
    const pruned = { ...attempts };
    Object.keys(pruned).forEach(key => {
      const before = pruned[key].length;
      pruned[key] = pruned[key].filter(id => validIds.has(id));
      if (pruned[key].length !== before) changed = true;
    });
    if (changed) {
      setAttempts(pruned);
      saveJSON('gmat-attempts', pruned);
    }
  }, []);

  // Validate active session on mount
  useEffect(() => {
    if (activeSession) {
      const validIds = new Set(bank.map(q => q.id));
      const validQIds = activeSession.questionIds.filter(id => validIds.has(id));
      if (validQIds.length === 0) {
        setActiveSession(null);
        localStorage.removeItem('gmat-active-session');
      } else if (validQIds.length !== activeSession.questionIds.length) {
        const fixed = { ...activeSession, questionIds: validQIds, currentIndex: Math.min(activeSession.currentIndex, validQIds.length - 1) };
        setActiveSession(fixed);
        saveJSON('gmat-active-session', fixed);
      }
      // If session was paused, keep it
      if (activeSession && activeSession.isPaused) {
        // Will show resume banner on landing
      }
    }
  }, []);

  const toggleTheme = useCallback(() => {
    setTheme(t => t === 'dark' ? 'light' : 'dark');
  }, []);

  const handleSelectSection = useCallback((sec) => {
    setSelectedSection(sec);
    setView('config');
  }, []);

  const handleStartSession = useCallback((section, difficulty, count) => {
    const isAdaptive = difficulty === 'adaptive';
    const attemptsCopy = { ...attempts };

    if (isAdaptive) {
      // Adaptive: pick only the first question (medium start), rest chosen dynamically
      const pool = filterQuestions(bank, section, null);
      const usedIds = new Set();
      const firstQ = selectAdaptiveQuestion(pool, 0, usedIds);
      if (!firstQ) return;
      const newSession = {
        section, difficulty: 'adaptive', isAdaptive: true,
        totalTarget: count,
        questionIds: [firstQ.id],
        currentIndex: 0, answers: [],
        thetaHistory: [0],
        isPaused: false, startedAt: new Date().toISOString()
      };
      setActiveSession(newSession);
      saveJSON('gmat-active-session', newSession);
      setView('question');
    } else {
      const result = selectSessionQuestions(bank, section, difficulty, count, attemptsCopy);
      const newSession = {
        section, difficulty,
        questionIds: result.questions.map(q => q.id),
        currentIndex: 0, answers: [],
        isPaused: false, startedAt: new Date().toISOString()
      };
      setActiveSession(newSession);
      saveJSON('gmat-active-session', newSession);
      setAttempts(attemptsCopy);
      saveJSON('gmat-attempts', attemptsCopy);
      setView('question');
    }
  }, [bank, attempts]);

  const handleAnswer = useCallback((answerRecord, isLast) => {
    setActiveSession(prev => {
      if (!prev) return null;
      const allAnswers = [...prev.answers, answerRecord];

      // Update attempt tracker
      const q = bank.find(qq => qq.id === answerRecord.questionId);
      if (q) {
        const newAttempts = { ...attempts };
        updateAttemptTracker(newAttempts, q.id, q.section, q.difficulty);
        const pool = filterQuestions(bank, q.section, q.difficulty);
        resetAttemptsIfExhausted(newAttempts, `${q.section}:${q.difficulty}`, pool.length);
        const sectionPool = filterQuestions(bank, q.section, null);
        resetAttemptsIfExhausted(newAttempts, q.section, sectionPool.length);
        setAttempts(newAttempts);
        saveJSON('gmat-attempts', newAttempts);
      }

      // Adaptive: compute theta and pick next question
      if (prev.isAdaptive) {
        const responses = allAnswers.map(a => {
          const aq = bank.find(x => x.id === a.questionId);
          return { correct: a.correct, difficulty: aq ? aq.difficulty : 'medium' };
        });
        const theta = estimateTheta(responses);
        const thetaHistory = [...(prev.thetaHistory || [0]), theta];
        const done = allAnswers.length >= prev.totalTarget;

        if (done) {
          const questions = prev.questionIds.map(id => bank.find(qq => qq.id === id)).filter(Boolean);
          const summary = computeScoreSummary(allAnswers, questions);
          const sectionScore = thetaToScore(theta);
          const percentile = getSectionPercentile(prev.section, sectionScore);
          const sessionRecord = {
            id: `sess_${Date.now()}`, section: prev.section, difficulty: 'adaptive',
            isAdaptive: true, totalQuestions: allAnswers.length,
            ...summary, answers: allAnswers,
            thetaHistory, finalTheta: theta, sectionScore, percentile,
            completedAt: new Date().toISOString()
          };
          const newSessions = [...sessions, sessionRecord];
          setSessions(newSessions);
          saveJSON('gmat-sessions', newSessions);
          setCompletedSession(sessionRecord);
          setActiveSession(null);
          localStorage.removeItem('gmat-active-session');
          setTimeout(() => setView('summary'), 0);
          return null;
        }

        // Pick next question
        const usedIds = new Set(prev.questionIds);
        const sectionPool = filterQuestions(bank, prev.section, null);
        const nextQ = selectAdaptiveQuestion(sectionPool, theta, usedIds);
        if (!nextQ) {
          // No more questions available — end session early
          const questions = prev.questionIds.map(id => bank.find(qq => qq.id === id)).filter(Boolean);
          const summary = computeScoreSummary(allAnswers, questions);
          const sectionScore = thetaToScore(theta);
          const percentile = getSectionPercentile(prev.section, sectionScore);
          const sessionRecord = {
            id: `sess_${Date.now()}`, section: prev.section, difficulty: 'adaptive',
            isAdaptive: true, totalQuestions: allAnswers.length,
            ...summary, answers: allAnswers,
            thetaHistory, finalTheta: theta, sectionScore, percentile,
            completedAt: new Date().toISOString()
          };
          const newSessions = [...sessions, sessionRecord];
          setSessions(newSessions);
          saveJSON('gmat-sessions', newSessions);
          setCompletedSession(sessionRecord);
          setActiveSession(null);
          localStorage.removeItem('gmat-active-session');
          setTimeout(() => setView('summary'), 0);
          return null;
        }

        const updated = {
          ...prev, answers: allAnswers, thetaHistory,
          questionIds: [...prev.questionIds, nextQ.id],
          currentIndex: prev.currentIndex + 1
        };
        saveJSON('gmat-active-session', updated);
        return updated;
      }

      // Non-adaptive: original logic
      const updated = {
        ...prev, answers: allAnswers,
        currentIndex: isLast ? prev.currentIndex : prev.currentIndex + 1
      };

      if (isLast) {
        const questions = prev.questionIds.map(id => bank.find(qq => qq.id === id)).filter(Boolean);
        const summary = computeScoreSummary(allAnswers, questions);
        const sessionRecord = {
          id: `sess_${Date.now()}`, section: prev.section, difficulty: prev.difficulty,
          totalQuestions: allAnswers.length, ...summary, answers: allAnswers,
          completedAt: new Date().toISOString()
        };
        const newSessions = [...sessions, sessionRecord];
        setSessions(newSessions);
        saveJSON('gmat-sessions', newSessions);
        setCompletedSession(sessionRecord);
        setActiveSession(null);
        localStorage.removeItem('gmat-active-session');
        setTimeout(() => setView('summary'), 0);
        return null;
      }

      saveJSON('gmat-active-session', updated);
      return updated;
    });
  }, [bank, attempts, sessions]);

  const handlePause = useCallback((remainingSec) => {
    setPausedRemaining(remainingSec);
    setActiveSession(prev => {
      const updated = { ...prev, isPaused: true, pausedRemaining: remainingSec };
      saveJSON('gmat-active-session', updated);
      return updated;
    });
    setView('paused');
  }, []);

  const handleResume = useCallback(() => {
    setActiveSession(prev => {
      // Recalculate endTime based on pausedRemaining
      const updated = { ...prev, isPaused: false };
      saveJSON('gmat-active-session', updated);
      return updated;
    });
    setView('question');
  }, []);

  const handleResumeFromLanding = useCallback(() => {
    if (activeSession) {
      if (activeSession.isPaused) {
        setView('paused');
      } else {
        setView('question');
      }
    }
  }, [activeSession]);

  const handleDiscard = useCallback(() => {
    setActiveSession(null);
    localStorage.removeItem('gmat-active-session');
  }, []);

  const showToast = useCallback((msg) => {
    setToastMsg(msg);
    setTimeout(() => setToastMsg(null), 2500);
  }, []);

  const handleClearAllData = useCallback(() => {
    localStorage.removeItem('gmat-sessions');
    localStorage.removeItem('gmat-attempts');
    localStorage.removeItem('gmat-active-session');
    setSessions([]);
    setAttempts({});
    setActiveSession(null);
    setCompletedSession(null);
    setShowClearConfirm(false);
    setView('landing');
    showToast('✓ All data cleared successfully');
  }, [showToast]);

  const handleRetryWrong = useCallback(() => {
    const wrong = getWrongQuestions(sessions, bank);
    if (wrong.length === 0) return;
    const shuffled = shuffle(wrong);
    const newSession = {
      section: 'mixed',
      difficulty: null,
      questionIds: shuffled.map(q => q.id),
      currentIndex: 0,
      answers: [],
      isPaused: false,
      startedAt: new Date().toISOString()
    };
    setActiveSession(newSession);
    saveJSON('gmat-active-session', newSession);
    setView('question');
  }, [sessions, bank]);

  const handleSpacedRepetition = useCallback(() => {
    const srDue = getSpacedRepetitionDue(sessions, bank);
    const questions = getSRQuestions(srDue);
    if (questions.length === 0) return;
    const newSession = {
      section: 'mixed',
      difficulty: null,
      questionIds: questions.map(q => q.id),
      currentIndex: 0,
      answers: [],
      isPaused: false,
      startedAt: new Date().toISOString()
    };
    setActiveSession(newSession);
    saveJSON('gmat-active-session', newSession);
    setView('question');
  }, [sessions, bank]);

  const handleWeakTopicPractice = useCallback((section, subsection, difficulty) => {
    const pool = getTopicQuestions(bank, section, subsection, difficulty);
    if (pool.length === 0) return;
    const shuffled = shuffle(pool).slice(0, Math.min(10, pool.length));
    const newSession = {
      section,
      difficulty,
      questionIds: shuffled.map(q => q.id),
      currentIndex: 0,
      answers: [],
      isPaused: false,
      startedAt: new Date().toISOString()
    };
    setActiveSession(newSession);
    saveJSON('gmat-active-session', newSession);
    setView('question');
  }, [bank]);

  const showPauseInHeader = view === 'question';

  const currentQuestionHasPassage = view === 'question' && activeSession && (() => {
    const q = bank.find(x => x.id === activeSession.questionIds[activeSession.currentIndex]);
    return q && q.passage;
  })();

  return (
    <div className={`container${currentQuestionHasPassage ? ' has-passage' : ''}`}>
      <Header
        theme={theme}
        onToggleTheme={toggleTheme}
        onProgress={() => setView('progress')}
        showPause={false}
        onPause={() => {}}
        onClearData={() => setShowClearConfirm(true)}
      />

      {view === 'landing' && (
        <div className="view-transition" key="landing">
        <LandingView
          attempts={attempts}
          activeSession={activeSession}
          onSelectSection={handleSelectSection}
          onResume={handleResumeFromLanding}
          onDiscard={handleDiscard}
          sessions={sessions}
          bank={bank}
          onQuestionHistory={() => setView('questionHistory')}
          onRetryWrong={handleRetryWrong}
          onAnalytics={() => setView('analytics')}
          onSpacedRepetition={handleSpacedRepetition}
          onWeakTopics={() => setView('weakTopics')}
        />
        </div>
      )}

      {view === 'config' && (
        <div className="view-transition" key="config">
        <SessionConfigView
          section={selectedSection}
          attempts={attempts}
          onBack={() => setView('landing')}
          onStart={handleStartSession}
        />
        </div>
      )}

      {view === 'question' && activeSession && (
        <QuestionView
          key={activeSession.currentIndex}
          session={activeSession}
          bank={bank}
          onAnswer={handleAnswer}
          onComplete={() => {}}
          onPause={handlePause}
        />
      )}

      {view === 'paused' && (
        <PauseOverlay onResume={handleResume} />
      )}

      {view === 'summary' && completedSession && (
        <div className="view-transition" key="summary">
        <ScoreSummaryView
          session={completedSession}
          questions={bank}
          sessions={sessions}
          onReview={() => setView('review')}
          onNewSession={() => { setCompletedSession(null); setView('landing'); }}
        />
        </div>
      )}

      {view === 'review' && completedSession && (
        <div className="view-transition" key="review">
        <ReviewView
          session={completedSession}
          questions={bank}
          onBack={() => setView('summary')}
        />
        </div>
      )}

      {view === 'progress' && (
        <div className="view-transition" key="progress">
        <ProgressDashboard
          sessions={sessions}
          onBack={() => setView('landing')}
        />
        </div>
      )}

      {view === 'questionHistory' && (
        <div className="view-transition" key="history">
        <QuestionHistoryView
          sessions={sessions}
          bank={bank}
          onBack={() => setView('landing')}
          onRetryWrong={getWrongQuestions(sessions, bank).length > 0 ? handleRetryWrong : null}
        />
        </div>
      )}

      {view === 'analytics' && (
        <div className="view-transition" key="analytics">
        <AnalyticsView sessions={sessions} bank={bank} onBack={() => setView('landing')} />
        </div>
      )}

      {view === 'weakTopics' && (
        <div className="view-transition" key="weakTopics">
        <WeakTopicsView sessions={sessions} bank={bank} onBack={() => setView('landing')} onPractice={handleWeakTopicPractice} />
        </div>
      )}

      {showClearConfirm && (
        <ConfirmDialog
          title="Clear All Data?"
          message="This will permanently delete all your sessions, attempt history, and active session. This action cannot be undone."
          onConfirm={handleClearAllData}
          onCancel={() => setShowClearConfirm(false)}
        />
      )}

      {showRestoreBanner && (
        <div className="resume-banner" style={{borderColor:'var(--cyan)',background:'rgba(0,212,255,.05)'}}>
          <p>💾 Found a backup of your previous data ({pendingBackup && pendingBackup._ts ? new Date(pendingBackup._ts).toLocaleString() : ''}). Restore it?</p>
          <div style={{display:'flex',gap:'8px'}}>
            <button className="resume-btn" onClick={handleRestore}>Restore</button>
            <button className="discard-btn" onClick={() => setShowRestoreBanner(false)}>Dismiss</button>
          </div>
        </div>
      )}

      <Toast message={toastMsg} />
    </div>
  );
}

// --- Password Gate ---
const PASS_HASHES = [
  '0682158226f127cd831ed27a96f6bc6514f4f97b88bb69dc552ea62ee5135e06', // user 1
];
async function checkPass(input) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(input));
  const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  return PASS_HASHES.includes(hash);
}

function PasswordGate() {
  const [authed, setAuthed] = React.useState(() => sessionStorage.getItem('gmat_auth') === '1');
  const [pw, setPw] = React.useState('');
  const [err, setErr] = React.useState(false);

  if (authed) return <GmatApp />;

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (await checkPass(pw)) {
      sessionStorage.setItem('gmat_auth', '1');
      setAuthed(true);
    } else {
      setErr(true);
      setPw('');
    }
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <form onSubmit={handleSubmit} style={{textAlign:'center',maxWidth:340,width:'100%',padding:'0 20px'}}>
        <div style={{fontSize:'2rem',marginBottom:8}}>🔒</div>
        <h2 style={{color:'var(--text)',fontFamily:'var(--font)',marginBottom:8}}>GMAT Practice</h2>
        <p style={{color:'var(--text-s)',fontSize:'.85rem',marginBottom:24}}>Enter password to continue</p>
        <input type="password" value={pw} onChange={e => { setPw(e.target.value); setErr(false); }}
          placeholder="Password" autoFocus
          style={{width:'100%',padding:'12px 16px',borderRadius:10,border: err ? '1px solid var(--warm)' : '1px solid var(--border)',
            background:'var(--surface)',color:'var(--text)',fontSize:'1rem',fontFamily:'var(--font)',outline:'none',marginBottom:12}} />
        {err && <p style={{color:'var(--warm)',fontSize:'.8rem',marginBottom:12}}>Incorrect password</p>}
        <button type="submit" style={{width:'100%',padding:'12px',borderRadius:10,border:'none',
          background:'var(--accent)',color:'#fff',fontSize:'.95rem',fontWeight:600,cursor:'pointer',fontFamily:'var(--font)'}}>
          Enter
        </button>
      </form>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PasswordGate />);

    </script>
