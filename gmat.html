<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>GMAT Practice — Dhruv Agrawal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg:#050508;--bg-el:#0c0c12;--surface:rgba(255,255,255,0.03);--surface-h:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.08);--border-h:rgba(255,255,255,0.15);
    --text:#eef0f4;--text-s:#8b92a5;--accent:#6c63ff;--accent-l:#8b83ff;--accent-g:rgba(108,99,255,0.4);
    --cyan:#00d4ff;--green:#00e88f;--warm:#ff6b6b;
    --section-accent:var(--accent);--section-accent-l:var(--accent-l);--section-accent-g:var(--accent-g);
    --font:'Space Grotesk',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
}
[data-section="quant"]{--section-accent:#a855f7;--section-accent-l:#c084fc;--section-accent-g:rgba(168,85,247,0.35)}
[data-section="verbal"]{--section-accent:#0ea5e9;--section-accent-l:#38bdf8;--section-accent-g:rgba(14,165,233,0.35)}
[data-section="data-insights"]{--section-accent:#14b8a6;--section-accent-l:#2dd4bf;--section-accent-g:rgba(20,184,166,0.35)}
[data-section="mixed"]{--section-accent:#f97316;--section-accent-l:#fb923c;--section-accent-g:rgba(249,115,22,0.35)}
[data-theme="light"]{
    --bg:#f4f5f7;--bg-el:#fff;--surface:rgba(0,0,0,0.03);--surface-h:rgba(0,0,0,0.06);
    --border:rgba(0,0,0,0.1);--border-h:rgba(0,0,0,0.18);--text:#1a1a2e;--text-s:#5a607a;
    --accent-g:rgba(108,99,255,0.2);
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;transition:background .3s,color .3s}
::selection{background:var(--accent);color:#fff}
#root{min-height:100vh}

/* Shared */
.container{max-width:1100px;margin:0 auto;padding:24px clamp(16px,4vw,40px)}
.container.has-passage{max-width:1400px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;transition:border-color .3s}
.card:hover{border-color:var(--border-h)}
.card-title{font-size:1.05rem;font-weight:600;margin-bottom:20px}

/* Header */
.hub-header{display:flex;justify-content:space-between;align-items:center;padding:20px 0 12px;flex-wrap:wrap;gap:12px}
.back-link{color:var(--text-s);text-decoration:none;font-size:.85rem;transition:color .3s}
.back-link:hover{color:var(--accent)}
.theme-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);transition:all .3s;font-size:1.1rem}
.theme-btn:hover{border-color:var(--accent)}
.hub-title{text-align:center;margin-bottom:32px}
.hub-title h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;margin-bottom:6px}
.hub-title p{color:var(--text-s);font-size:.9rem}

/* Buttons */
.calc-btn{width:100%;padding:15px;margin-top:24px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;font-family:var(--font);box-shadow:0 4px 24px var(--accent-g);transition:transform .2s,box-shadow .2s}
.calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--accent-g)}
.calc-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.toggle-wrap{display:flex;gap:8px}
.toggle-btn{flex:1;padding:12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--text-s);font-size:.9rem;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .3s}
[data-theme="light"] .toggle-btn{background:rgba(0,0,0,0.03)}
.toggle-btn.active{background:rgba(108,99,255,.12);border-color:var(--accent);color:var(--accent-l)}

/* Summary cards */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center}
.summary-card.full{grid-column:1/-1}
.s-label{display:block;font-size:.7rem;color:var(--text-s);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.s-value{font-weight:700;font-family:var(--mono);font-size:1.4rem}
.s-value.big{font-size:2rem}

/* Breakdown rows */
.b-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.b-row+.b-row{border-top:1px solid rgba(255,255,255,0.03)}
[data-theme="light"] .b-row+.b-row{border-top-color:rgba(0,0,0,0.05)}
.b-label{color:var(--text-s);font-size:.88rem}
.b-val{font-family:var(--mono);font-size:.92rem;font-weight:500}

/* Inputs */
.label{display:block;font-size:.75rem;color:var(--text-s);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;margin-top:16px}
.label:first-of-type{margin-top:0}
.input-wrap{display:flex;align-items:center;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .3s}
[data-theme="light"] .input-wrap{background:rgba(0,0,0,0.03)}
.input-wrap:focus-within{border-color:var(--accent)}

/* Note */
.note{font-size:.72rem;color:var(--text-s);margin-top:16px;line-height:1.6;padding:12px;background:rgba(108,99,255,.05);border-radius:10px;border:1px solid rgba(108,99,255,.1)}

/* Presets */
.presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.preset-btn{padding:7px 16px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--text-s);font-size:.78rem;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .3s}
.preset-btn:hover,.preset-btn.active{background:rgba(108,99,255,.1);border-color:var(--accent);color:var(--accent-l)}

@media(max-width:480px){
    .summary-grid{grid-template-columns:1fr 1fr}
    .summary-card.full{grid-column:1/-1}
}

/* Section Cards */
.section-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.section-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px var(--accent-g)}
.section-card .icon{font-size:2rem;margin-bottom:12px}
.section-card h3{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.section-card .total-q{color:var(--text-s);font-size:.85rem;margin-bottom:12px}
.section-card .diff-counts{display:flex;gap:8px;flex-wrap:wrap}
.diff-tag{font-size:.72rem;padding:4px 10px;border-radius:100px;background:var(--surface-h);color:var(--text-s);font-weight:500}
.diff-tag.easy{color:var(--green);background:rgba(0,232,143,.08)}
.diff-tag.medium{color:var(--cyan);background:rgba(0,212,255,.08)}
.diff-tag.hard{color:var(--warm);background:rgba(255,107,107,.08)}

/* Resume Banner */
.resume-banner{background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.2);border-radius:14px;padding:16px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.resume-banner p{font-size:.9rem;color:var(--text)}
.resume-banner .resume-btn{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:transform .2s}
.resume-banner .resume-btn:hover{transform:translateY(-1px)}
.resume-banner .discard-btn{padding:10px 16px;background:transparent;color:var(--text-s);border:1px solid var(--border);border-radius:10px;font-size:.85rem;cursor:pointer;font-family:var(--font);transition:all .3s}
.resume-banner .discard-btn:hover{border-color:var(--warm);color:var(--warm)}

/* Session Config */
.config-section{margin-bottom:24px}
.config-section h3{font-size:.85rem;color:var(--text-s);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:500}
.config-back{display:inline-flex;align-items:center;gap:6px;color:var(--text-s);font-size:.85rem;cursor:pointer;background:none;border:none;font-family:var(--font);margin-bottom:20px;transition:color .3s}
.config-back:hover{color:var(--accent)}
.count-input{width:80px;padding:10px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:.95rem;text-align:center;outline:none;transition:border-color .3s}
[data-theme="light"] .count-input{background:rgba(0,0,0,0.03)}
.count-input:focus{border-color:var(--accent)}
.unattempted-info{font-size:.82rem;color:var(--text-s);margin-top:12px;padding:10px 14px;background:var(--surface);border-radius:10px;border:1px solid var(--border)}
.unattempted-info.warning{border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.05);color:var(--warm)}
.warning-actions{display:flex;gap:8px;margin-top:10px}
.warning-actions button{padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .3s}
.warning-actions .shorter-btn{background:rgba(108,99,255,.1);border:1px solid var(--accent);color:var(--accent-l)}
.warning-actions .reset-btn{background:transparent;border:1px solid var(--border);color:var(--text-s)}
.warning-actions .reset-btn:hover{border-color:var(--warm);color:var(--warm)}

/* Question View */
.question-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.question-num{font-size:.85rem;color:var(--text-s);font-weight:500}
.question-prompt{font-size:1.15rem;line-height:1.85;margin-bottom:28px;font-weight:400;letter-spacing:.01em}

/* Split layout: passage left, question right on desktop */
.rc-split-layout{display:flex;gap:24px;align-items:flex-start}
.rc-split-layout .rc-passage-panel{flex:0 0 45%;max-height:calc(100vh - 240px);position:sticky;top:20px;margin-bottom:0}
.rc-split-layout .rc-question-side{flex:1;min-width:0}
@media(max-width:900px){
    .rc-split-layout{flex-direction:column}
    .rc-split-layout .rc-passage-panel{flex:none;width:100%;max-height:350px;position:static}
}

.rc-passage-panel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:0;margin-bottom:24px;max-height:350px;overflow:hidden;display:flex;flex-direction:column}
.rc-passage-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);flex-shrink:0}
.rc-passage-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--cyan);font-weight:700;display:flex;align-items:center;gap:6px}
.rc-passage-label::before{content:'📖'}
.rc-passage-meta{font-size:.7rem;color:var(--text-s);font-weight:500}
.rc-passage-scroll{overflow-y:auto;padding:16px 20px;flex:1;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.rc-passage-scroll::-webkit-scrollbar{width:5px}
.rc-passage-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:10px}
.rc-passage-text{font-size:.92rem;line-height:1.85;color:var(--text-p);text-align:justify}
.rc-passage-toggle{background:none;border:1px solid rgba(255,255,255,.1);color:var(--text-s);font-size:.7rem;padding:3px 10px;border-radius:6px;cursor:pointer;transition:all .2s}
.rc-passage-toggle:hover{border-color:var(--cyan);color:var(--cyan)}
.rc-q-indicator{font-size:.75rem;color:var(--text-s);margin-bottom:8px;font-weight:500}
.difficulty-badge{display:inline-block;font-size:.7rem;padding:4px 12px;border-radius:100px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}

/* Improved question readability */
.choice-btn{font-size:1rem;line-height:1.6;padding:18px 22px}
.choice-btn .choice-text{letter-spacing:.01em}
.difficulty-badge.easy{color:var(--green);background:rgba(0,232,143,.1);border:1px solid rgba(0,232,143,.2)}
.difficulty-badge.medium{color:var(--cyan);background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2)}
.difficulty-badge.hard{color:var(--warm);background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.2)}

/* Answer Choices */
.choices-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.choice-btn{display:flex;align-items:center;gap:14px;width:100%;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:.95rem;cursor:pointer;font-family:var(--font);transition:all .2s;text-align:left;line-height:1.5}
.choice-btn:hover{border-color:var(--border-h);background:var(--surface-h)}
.choice-btn.selected{border-color:var(--accent);background:rgba(108,99,255,.08)}
.choice-id{width:32px;height:32px;border-radius:50%;background:var(--surface-h);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.85rem;flex-shrink:0;transition:all .2s}
.choice-btn.selected .choice-id{background:var(--accent);color:#fff}

/* Timer */
.timer-display{font-family:var(--mono);font-size:1.3rem;font-weight:600;padding:6px 16px;border-radius:10px;background:var(--surface);border:1px solid var(--border);transition:all .3s}
.timer-display.normal{color:var(--text)}
.timer-display.warning{color:#f0a500;border-color:rgba(240,165,0,.3);background:rgba(240,165,0,.06)}
.timer-display.urgent{color:var(--warm);border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.06);animation:pulse-urgent 1s ease-in-out infinite}
.timer-display.overtime{color:var(--warm);border-color:rgba(255,107,107,.2);background:rgba(255,107,107,.04);opacity:.7}
@keyframes pulse-urgent{0%,100%{opacity:1}50%{opacity:.7}}

/* Progress Bar */
.progress-bar-wrap{width:100%;height:6px;background:var(--surface-h);border-radius:100px;margin-bottom:24px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:100px;transition:width .4s ease}

/* Pause Overlay */
.pause-overlay{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.pause-overlay h2{font-size:1.8rem;font-weight:700}
.pause-overlay p{color:var(--text-s);font-size:.9rem}
.pause-overlay .resume-btn{padding:14px 40px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;font-family:var(--font);box-shadow:0 4px 24px var(--accent-g);transition:transform .2s}
.pause-overlay .resume-btn:hover{transform:translateY(-2px)}

/* Navigation Buttons */
.nav-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:8px}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.question-fade{animation:fadeSlideIn .3s ease-out}
.question-fade.slide-out{animation:slideOut .25s ease-in forwards}
@keyframes slideOut{to{opacity:0;transform:translateX(-30px)}}

/* Choice select animation */
@keyframes choicePop{0%{transform:scale(1)}40%{transform:scale(1.02)}100%{transform:scale(1)}}
.choice-btn.selected{animation:choicePop .25s ease-out;border-color:var(--section-accent);background:color-mix(in srgb, var(--section-accent) 8%, transparent)}
.choice-btn.selected .choice-id{background:var(--section-accent);color:#fff}

/* Section-colored elements during quiz */
.progress-bar-fill{background:var(--section-accent) !important}
.next-btn{background:var(--section-accent);box-shadow:0 4px 24px var(--section-accent-g)}
.next-btn:hover:not(:disabled){box-shadow:0 8px 32px var(--section-accent-g)}

/* Running stats toast */
.running-stats{position:fixed;bottom:24px;right:24px;background:var(--bg-el);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:.78rem;color:var(--text-s);z-index:2000;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.3);animation:statsIn .3s ease,statsOut .4s ease 2s forwards;pointer-events:none}
.running-stats .rs-correct{color:var(--green);font-weight:700;font-family:var(--mono)}
.running-stats .rs-sep{opacity:.3}
@keyframes statsIn{from{opacity:0;transform:translateY(12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes statsOut{to{opacity:0;transform:translateY(8px) scale(.95)}}
@keyframes confettiFall{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall 3s ease-in forwards}
.analytics-bar{height:20px;border-radius:6px;background:rgba(255,255,255,.06);overflow:hidden;margin-bottom:6px}
.analytics-fill{height:100%;border-radius:6px;transition:width .6s ease}
.analytics-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.analytics-label{font-size:.75rem;color:var(--text-s);margin-bottom:4px}
.analytics-value{font-size:1.4rem;font-weight:700;color:var(--text)}
.time-comparison{display:flex;gap:20px;margin-top:12px}
.time-stat{flex:1;text-align:center;padding:12px;border-radius:10px;background:rgba(255,255,255,.03)}
.time-stat-label{font-size:.7rem;color:var(--text-s);text-transform:uppercase;letter-spacing:.05em}
.time-stat-value{font-size:1.3rem;font-weight:700;margin-top:4px}
.next-btn{padding:14px 32px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:var(--font);box-shadow:0 4px 24px var(--accent-g);transition:all .2s;margin-left:auto}
.next-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 32px var(--accent-g)}
.next-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.pause-btn{padding:10px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text-s);font-size:.85rem;cursor:pointer;font-family:var(--font);transition:all .3s}
.pause-btn:hover{border-color:var(--accent);color:var(--accent)}
.header-actions{display:flex;align-items:center;gap:8px}

/* ── View Transitions ── */
.view-transition{animation:viewIn .4s ease both}
@keyframes viewIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── Cinematic Score Reveal ── */
.score-reveal{text-align:center;padding:40px 0 20px}
.score-reveal-blur{filter:blur(12px);opacity:0;animation:scoreUnblur 1.2s cubic-bezier(.16,1,.3,1) forwards;animation-delay:.3s}
@keyframes scoreUnblur{to{filter:blur(0);opacity:1}}
.score-reveal-number{font-family:var(--mono);font-weight:700;font-size:4.5rem;line-height:1;background:linear-gradient(135deg,#6c63ff,#00d4ff,#00e88f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% 200%;animation:scoreGradient 3s ease infinite}
@keyframes scoreGradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.score-reveal-label{font-size:.75rem;color:var(--text-s);text-transform:uppercase;letter-spacing:.12em;margin-top:6px}
.score-reveal-pct{font-size:1.1rem;color:var(--accent-l);font-weight:600;margin-top:10px;opacity:0;animation:fadeUp .5s ease forwards;animation-delay:1.6s}
.score-reveal-section{font-size:.85rem;color:var(--text-s);margin-top:4px;opacity:0;animation:fadeUp .5s ease forwards;animation-delay:1.9s}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.score-confetti-trigger{position:relative}

/* ── Floating Particles Background ── */
.cc-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.cc-particle-dot{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--accent);opacity:0;animation:particleFloat linear infinite}
[data-theme="light"] .cc-particle-dot{background:rgba(108,99,255,.3)}
@keyframes particleFloat{0%{opacity:0;transform:translateY(0)}10%{opacity:.4}90%{opacity:.4}100%{opacity:0;transform:translateY(-100vh)}}

/* ── Animated Gradient Border on Mission Cards ── */
.cc-mission{background:var(--surface);border:1px solid transparent;border-radius:16px;padding:20px;cursor:pointer;transition:all .35s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.cc-mission::after{content:'';position:absolute;inset:-1px;border-radius:16px;padding:1px;background:linear-gradient(135deg,var(--section-accent,var(--accent)),transparent 40%,transparent 60%,var(--section-accent-l,var(--accent-l)));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.3;transition:opacity .4s;pointer-events:none;animation:borderShift 6s ease-in-out infinite alternate}
.cc-mission:hover::after{opacity:.8}
@keyframes borderShift{0%{background:linear-gradient(135deg,var(--section-accent,var(--accent)),transparent 40%,transparent 60%,var(--section-accent-l,var(--accent-l)))}100%{background:linear-gradient(315deg,var(--section-accent-l,var(--accent-l)),transparent 40%,transparent 60%,var(--section-accent,var(--accent)))}}

/* ── Staggered Entrance ── */
.cc-entrance{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s cubic-bezier(.16,1,.3,1)}
.cc-entrance.visible{opacity:1;transform:translateY(0)}

/* ── Command Center ── */
.cc-hero{text-align:center;padding:20px 0 24px;position:relative}
.cc-hero h1{font-size:clamp(1.4rem,3.5vw,2rem);font-weight:700;margin-bottom:2px}
.cc-hero h1 .cc-flame{margin-left:8px;font-size:.85em}
.cc-hero .cc-sub{color:var(--text-s);font-size:.82rem}

/* ── Readiness Ring — Premium ── */
.cc-ring-wrap{position:relative;width:190px;height:190px;margin:24px auto 12px}
.cc-ring-svg{width:100%;height:100%;transform:rotate(-90deg);filter:drop-shadow(0 0 12px var(--accent-g))}
.cc-ring-bg{fill:none;stroke:var(--border);stroke-width:5;opacity:.5}
.cc-ring-track{fill:none;stroke:rgba(108,99,255,.08);stroke-width:8}
.cc-ring-fill{fill:none;stroke-width:7;stroke-linecap:round;transition:none}
.cc-ring-wrap.animated .cc-ring-fill{transition:stroke-dashoffset 2s cubic-bezier(.16,1,.3,1)}

/* Glassmorphism center */
.cc-ring-center{position:absolute;inset:28px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.03);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 0 30px rgba(108,99,255,.05)}
[data-theme="light"] .cc-ring-center{background:rgba(255,255,255,.7);border-color:rgba(0,0,0,.08);box-shadow:inset 0 0 30px rgba(108,99,255,.03)}
[data-theme="light"] .cc-ring-glow{opacity:.12;background:conic-gradient(from 0deg,transparent 0%,rgba(108,99,255,.12) 25%,transparent 50%,rgba(0,180,220,.08) 75%,transparent 100%)}
[data-theme="light"] .cc-ring-particle{background:#6c63ff;box-shadow:0 0 8px 2px rgba(108,99,255,.4),0 0 16px 4px rgba(108,99,255,.1)}
[data-theme="light"] .cc-ring-pulse{border-color:rgba(108,99,255,.15)}
[data-theme="light"] .cc-ring-svg{filter:drop-shadow(0 0 6px rgba(108,99,255,.1))}
[data-theme="light"] .cc-ring-track{stroke:rgba(108,99,255,.05)}
[data-theme="light"] .cc-ring-bg{stroke:rgba(0,0,0,.06)}
[data-theme="light"] .cc-ring-score{background:linear-gradient(135deg,#5a52e0,#0090cc);-webkit-background-clip:text;background-clip:text}

/* Light theme — Mission Cards */
[data-theme="light"] .cc-mission{background:rgba(255,255,255,.7);border-color:rgba(0,0,0,.08)}
[data-theme="light"] .cc-mission:hover{box-shadow:0 12px 40px rgba(108,99,255,.1);border-color:rgba(108,99,255,.2)}
[data-theme="light"] .cc-mission::after{opacity:.15}
[data-theme="light"] .cc-mission:hover::after{opacity:.4}
[data-theme="light"] .cc-mission::before{background:linear-gradient(90deg,var(--section-accent,#6c63ff),var(--section-accent-l,#8b83ff))}
[data-theme="light"] .cc-mission-score{color:#5a52e0}
[data-theme="light"] .cc-mission-new{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1);color:#5a607a}

/* Light theme — Progress Bar */
[data-theme="light"] .cc-progress-bar{background:rgba(0,0,0,.06)}
[data-theme="light"] .cc-progress-fill{background:linear-gradient(90deg,var(--section-accent,#6c63ff),var(--section-accent-l,#8b83ff))}

/* Light theme — Toolbar */
[data-theme="light"] .cc-tool{background:rgba(255,255,255,.7);border-color:rgba(0,0,0,.08)}
[data-theme="light"] .cc-tool:hover{border-color:rgba(108,99,255,.3);box-shadow:0 6px 20px rgba(108,99,255,.1)}
[data-theme="light"] .cc-tool-badge{background:#e53e3e}

/* Light theme — Particles */
[data-theme="light"] .cc-particle-dot{background:rgba(108,99,255,.15)}

/* Light theme — Score Reveal */
[data-theme="light"] .score-reveal-number{background:linear-gradient(135deg,#5a52e0,#0090cc,#00b87a);-webkit-background-clip:text;background-clip:text;background-size:200% 200%}
[data-theme="light"] .score-reveal-pct{color:#5a52e0}

/* Light theme — Stats text */
[data-theme="light"] .cc-hero h1{color:#1a1a2e}
[data-theme="light"] .cc-flame{color:#e53e3e}
.cc-ring-score{font-family:var(--mono);font-weight:700;font-size:2.4rem;line-height:1;background:linear-gradient(135deg,#6c63ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cc-ring-label{font-size:.6rem;color:var(--text-s);text-transform:uppercase;letter-spacing:.14em;margin-top:4px}

/* Rotating outer glow */
.cc-ring-glow{position:absolute;inset:-15px;border-radius:50%;opacity:.35;animation:ringRotate 14s linear infinite;pointer-events:none;background:conic-gradient(from 0deg,transparent 0%,var(--accent-g) 25%,transparent 50%,rgba(0,212,255,.3) 75%,transparent 100%)}
@keyframes ringRotate{to{transform:rotate(360deg)}}

/* Orbiting particle */
.cc-ring-orbit{position:absolute;inset:-6px;border-radius:50%;animation:ringRotate 8s linear infinite;pointer-events:none}
.cc-ring-particle{position:absolute;top:0;left:50%;width:8px;height:8px;margin-left:-4px;margin-top:-4px;border-radius:50%;background:#00d4ff;box-shadow:0 0 12px 4px rgba(0,212,255,.6),0 0 24px 8px rgba(0,212,255,.2)}

/* Pulse rings */
.cc-ring-pulse{position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--accent);opacity:0;animation:ringPulse 4.5s ease-out infinite;pointer-events:none}
.cc-ring-pulse:nth-child(2){animation-delay:1.5s}
.cc-ring-pulse:nth-child(3){animation-delay:3s}
@keyframes ringPulse{0%{opacity:.3;transform:scale(1)}100%{opacity:0;transform:scale(1.15)}}

/* Hover: intensify effects */
.cc-ring-wrap .cc-ring-fill{transition:stroke-dashoffset 2s cubic-bezier(.16,1,.3,1)}
.cc-ring-wrap:hover .cc-ring-glow{opacity:.55}
.cc-ring-wrap:hover .cc-ring-particle{box-shadow:0 0 16px 6px rgba(0,212,255,.8),0 0 32px 12px rgba(0,212,255,.3)}

/* Mission Cards */
.cc-missions{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.cc-mission{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .35s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.cc-mission:hover{transform:translateY(-4px) scale(1.02);border-color:var(--section-accent-l,var(--accent-l));box-shadow:0 16px 48px var(--section-accent-g,var(--accent-g))}
.cc-mission::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--section-accent,var(--accent)),var(--section-accent-l,var(--accent-l)));opacity:0;transition:opacity .3s}
.cc-mission:hover::before{opacity:1}
.cc-mission-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.cc-mission-icon{font-size:2.2rem;display:inline-block;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.cc-mission:hover .cc-mission-icon{animation:iconDance .6s ease-in-out}
@keyframes iconDance{0%{transform:scale(1) rotate(0)}20%{transform:scale(1.2) rotate(-10deg)}40%{transform:scale(1.1) rotate(8deg)}60%{transform:scale(1.15) rotate(-5deg)}80%{transform:scale(1.05) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
.cc-mission-score{font-family:var(--mono);font-weight:700;font-size:1.5rem;color:var(--section-accent-l,var(--accent-l));opacity:.9}
.cc-mission-score-label{font-size:.7rem;color:var(--text-s);font-weight:500;margin-left:1px}
.cc-mission-stat{display:flex;align-items:baseline}
.cc-mission-new{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-s);background:var(--surface-h);padding:4px 10px;border-radius:100px;border:1px solid var(--border)}
.cc-mission h3{font-size:.92rem;font-weight:600;margin-bottom:10px}

/* Progress ring inside mission card */
.cc-mini-ring{width:36px;height:36px;flex-shrink:0}
.cc-mini-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.cc-mini-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:3}
.cc-mini-ring .ring-fill{fill:none;stroke-width:3;stroke-linecap:round;stroke:var(--section-accent,var(--accent))}

/* Difficulty heatmap */
.cc-heatmap{display:flex;gap:3px;margin-top:6px;height:6px;border-radius:3px;overflow:hidden}

/* Section progress bar — animates on hover */
.cc-progress-bar{height:4px;border-radius:2px;background:var(--border);margin-top:10px;overflow:hidden}
.cc-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--section-accent,var(--accent)),var(--section-accent-l,var(--accent-l)));width:0%;transition:width 1s cubic-bezier(.16,1,.3,1)}
.cc-mission:hover .cc-progress-fill{width:var(--prog) !important}
.cc-heat-seg{flex:1;border-radius:3px;transition:opacity .3s}

/* Action Toolbar */
.cc-toolbar{display:flex;justify-content:center;gap:10px;padding:16px 0}
.cc-tool{position:relative;width:60px;height:60px;border-radius:16px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.6rem;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.cc-tool:hover{transform:translateY(-3px) scale(1.1);border-color:var(--accent);box-shadow:0 8px 24px var(--accent-g);animation:toolBounce .4s ease}
@keyframes toolBounce{0%{transform:translateY(0) scale(1)}40%{transform:translateY(-6px) scale(1.15)}70%{transform:translateY(-2px) scale(1.08)}100%{transform:translateY(-3px) scale(1.1)}}
.cc-tool-badge{position:absolute;top:-5px;right:-5px;min-width:20px;height:20px;border-radius:10px;background:var(--warm);color:#fff;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;font-family:var(--mono)}
.cc-tool-label{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:.65rem;color:var(--text-s);white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.cc-tool:hover .cc-tool-label{opacity:1}

/* Responsive */
@media(max-width:768px){
    .cc-missions{grid-template-columns:1fr}
    .cc-ring-wrap{width:160px;height:160px}
    .cc-ring-score{font-size:2rem}
    .cc-toolbar{gap:10px}
    .cc-tool{width:52px;height:52px;font-size:1.4rem}
    .section-grid{grid-template-columns:1fr}
    .question-prompt{font-size:1rem}
    .timer-display{font-size:1.1rem}
    .nav-row{flex-direction:column}
    .next-btn{width:100%;text-align:center;margin-left:0}
    .resume-banner{flex-direction:column;text-align:center}
}
@media(max-width:480px){
    .container{padding:16px}
    .choice-btn{padding:12px 14px;font-size:.88rem}
    .choice-id{width:28px;height:28px;font-size:.78rem}
    .hub-title h1{font-size:1.4rem}
}
@media(min-width:1600px){
    .container{max-width:1200px}
    .container.has-passage{max-width:1500px}
}

/* Review View */
.review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.review-header h2{font-size:1.3rem;font-weight:700}
.review-header .review-count{color:var(--text-s);font-size:.88rem}
.review-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;transition:border-color .3s}
.review-card:hover{border-color:var(--border-h)}
.review-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.review-marker{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;font-weight:600;padding:4px 12px;border-radius:100px}
.review-marker.correct{color:var(--green);background:rgba(0,232,143,.1);border:1px solid rgba(0,232,143,.2)}
.review-marker.incorrect{color:var(--warm);background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.2)}
.review-marker.unanswered{color:var(--text-s);background:var(--surface-h);border:1px solid var(--border)}
.review-prompt{font-size:1.05rem;line-height:1.7;margin-bottom:16px}
.review-choices{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.review-choice{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;border:2px solid var(--border);font-size:.92rem;line-height:1.5;transition:all .2s}
.review-choice .choice-id{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.82rem;flex-shrink:0;background:var(--surface-h)}
.review-choice.is-correct{border-color:var(--green);background:rgba(0,232,143,.06)}
.review-choice.is-correct .choice-id{background:var(--green);color:#000}
.review-choice.is-selected-correct{border-color:var(--green);background:rgba(0,232,143,.08)}
.review-choice.is-selected-correct .choice-id{background:var(--green);color:#000}
.review-choice.is-selected-incorrect{border-color:var(--warm);background:rgba(255,107,107,.06)}
.review-choice.is-selected-incorrect .choice-id{background:var(--warm);color:#fff}
.review-meta{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:12px;font-size:.8rem;color:var(--text-s)}
.review-meta span{display:inline-flex;align-items:center;gap:4px}
.review-explanation{padding:16px;background:rgba(108,99,255,.05);border:1px solid rgba(108,99,255,.12);border-radius:12px;font-size:.88rem;line-height:1.7;color:var(--text)}
.review-explanation strong{display:block;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent-l);margin-bottom:6px}
.back-top-btn{padding:10px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text-s);font-size:.85rem;cursor:pointer;font-family:var(--font);transition:all .3s}
.back-top-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Score Summary Animations */
.summary-reveal{animation:fadeSlideUp .5s ease both}
.summary-reveal:nth-child(2){animation-delay:.1s}
.summary-reveal:nth-child(3){animation-delay:.15s}
.summary-reveal:nth-child(4){animation-delay:.2s}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.breakdown-bar-wrap{width:100%;height:8px;background:var(--surface-h);border-radius:100px;overflow:hidden;margin-top:4px}
.breakdown-bar-fill{height:100%;border-radius:100px;transition:width .6s ease}
.breakdown-bar-fill.easy{background:var(--green)}
.breakdown-bar-fill.medium{background:var(--cyan)}
.breakdown-bar-fill.hard{background:var(--warm)}

/* Progress Dashboard */
.progress-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.progress-stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.progress-stat .stat-val{font-family:var(--mono);font-size:1.5rem;font-weight:700;margin-bottom:4px}
.progress-stat .stat-label{font-size:.72rem;color:var(--text-s);text-transform:uppercase;letter-spacing:.08em}
.chart-container{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px}
.chart-container h3{font-size:.95rem;font-weight:600;margin-bottom:16px}
.chart-container canvas{width:100%;height:200px;display:block}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-s)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:16px}
.empty-state p{font-size:1rem;margin-bottom:8px}
.empty-state .empty-sub{font-size:.85rem;color:var(--text-s)}
.weakest-area{background:rgba(255,107,107,.06);border:1px solid rgba(255,107,107,.15);border-radius:14px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.weakest-area .wa-icon{font-size:1.4rem}
.weakest-area .wa-text{font-size:.9rem}
.weakest-area .wa-text strong{color:var(--warm)}
.section-breakdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.section-breakdown-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px}
.section-breakdown-card h4{font-size:.88rem;font-weight:600;margin-bottom:8px}
.section-breakdown-card .sb-stat{font-size:.82rem;color:var(--text-s);margin-bottom:4px}
.session-history{margin-bottom:24px}
.session-history h3{font-size:.95rem;font-weight:600;margin-bottom:12px}
.session-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.session-item .si-left{display:flex;align-items:center;gap:10px}
.session-item .si-section{font-weight:600;font-size:.88rem}
.session-item .si-diff{font-size:.75rem;color:var(--text-s)}
.session-item .si-right{display:flex;align-items:center;gap:16px;font-size:.82rem;color:var(--text-s)}
.session-item .si-acc{font-family:var(--mono);font-weight:600;color:var(--text)}

@media(max-width:480px){
    .review-card{padding:16px}
    .review-choice{padding:10px 12px;font-size:.85rem}
    .progress-stats{grid-template-columns:1fr 1fr}
    .section-breakdown{grid-template-columns:1fr}
}

/* Question History */
.qh-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.qh-tab{padding:8px 18px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--text-s);font-size:.82rem;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .3s}
.qh-tab.active{background:rgba(108,99,255,.12);border-color:var(--accent);color:var(--accent-l)}
.qh-summary-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.qh-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;text-align:center;flex:1;min-width:100px}
.qh-stat .qh-stat-val{font-family:var(--mono);font-size:1.3rem;font-weight:700}
.qh-stat .qh-stat-label{font-size:.7rem;color:var(--text-s);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.qh-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.qh-item:hover{border-color:var(--border-h)}
.qh-item.expanded{border-color:var(--accent);background:rgba(108,99,255,.03)}
.qh-item-row{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.qh-item-prompt{flex:1;font-size:.9rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.qh-item-meta{display:flex;gap:8px;align-items:center;flex-shrink:0}
.qh-status{font-weight:700;font-size:.9rem;width:24px;text-align:center}
.qh-status.correct{color:var(--green)}
.qh-status.incorrect{color:var(--warm)}
.qh-status.unanswered{color:var(--text-s)}
.qh-detail{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.qh-detail-prompt{font-size:1rem;line-height:1.7;margin-bottom:14px}

/* Retry Wrong Card */
.retry-card{background:rgba(255,107,107,.04);border:1px solid rgba(255,107,107,.15);border-radius:16px;padding:24px;margin-bottom:24px;cursor:pointer;transition:all .3s}
.retry-card:hover{border-color:rgba(255,107,107,.35);transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,107,107,.1)}
.retry-card h3{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.retry-card .retry-desc{color:var(--text-s);font-size:.85rem;margin-bottom:12px}
.retry-card .retry-counts{display:flex;gap:8px;flex-wrap:wrap}
.retry-count-tag{font-size:.72rem;padding:4px 10px;border-radius:100px;background:rgba(255,107,107,.08);color:var(--warm);font-weight:500}
.retry-count-tag.none{background:rgba(0,232,143,.08);color:var(--green)}

/* History Button */
.history-btn-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:16px;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:14px}
.history-btn-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 20px var(--accent-g)}
.history-btn-card .hbc-icon{font-size:1.6rem}

<body>
    <div id="root"></div>
    <script>var GMAT_QUESTIONS = [];</script>
    <script src="quant-easy.js"></script>
    <script src="quant-medium.js"></script>
    <script src="quant-hard.js"></script>
    <script src="verbal-rc-easy.js"></script>
    <script src="verbal-rc-medium.js"></script>
    <script src="verbal-rc-hard.js"></script>
    <script src="verbal-cr-easy.js"></script>
    <script src="verbal-cr-medium.js"></script>
    <script src="verbal-cr-hard.js"></script>
    <script src="di-ds-easy.js"></script>
    <script src="di-ds-medium.js"></script>
    <script src="di-ds-hard.js"></script>
    <script src="gmat-irt.js"></script>
    <script type="text/babel">

const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════════════
// PURE UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════════

// localStorage helpers
function loadJSON(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch(e) { console.warn('localStorage write failed:', e); }
  try { backupToIDB(); } catch(e) { /* silent */ }
}

// ═══════════════════════════════════════════════════════════
// IndexedDB Auto-Backup (survives localStorage clears)
// ═══════════════════════════════════════════════════════════
const IDB_NAME = 'gmat-backup';
const IDB_STORE = 'data';
const BACKUP_KEYS = ['gmat-sessions', 'gmat-attempts', 'gmat-active-session', 'gmat-theme'];

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function backupToIDB() {
  try {
    const db = await openIDB();
    const tx = db.transaction(IDB_STORE, 'readwrite');
    const store = tx.objectStore(IDB_STORE);
    const snapshot = {};
    BACKUP_KEYS.forEach(k => {
      const v = localStorage.getItem(k);
      if (v !== null) snapshot[k] = v;
    });
    snapshot._ts = Date.now();
    store.put(snapshot, 'latest');
  } catch(e) { /* silent */ }
}

async function restoreFromIDB() {
  try {
    const db = await openIDB();
    const tx = db.transaction(IDB_STORE, 'readonly');
    const store = tx.objectStore(IDB_STORE);
    return new Promise((resolve) => {
      const req = store.get('latest');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

// On load: if localStorage is empty but IDB has backup, offer restore
async function checkAndRestore() {
  const hasSessions = localStorage.getItem('gmat-sessions');
  if (hasSessions) return false; // data exists, no need
  const backup = await restoreFromIDB();
  if (!backup || !backup['gmat-sessions']) return false;
  const parsed = JSON.parse(backup['gmat-sessions']);
  if (!Array.isArray(parsed) || parsed.length === 0) return false;
  return backup; // return backup for user to confirm
}

// Question validation
function validateQuestion(q) {
  const validSections = ['quant', 'verbal', 'data-insights'];
  const validDifficulties = ['easy', 'medium', 'hard'];
  return q && typeof q.id === 'string' && validSections.includes(q.section) &&
    validDifficulties.includes(q.difficulty) && typeof q.prompt === 'string' && q.prompt.length > 0 &&
    Array.isArray(q.choices) && q.choices.length >= 2 &&
    q.choices.some(c => c.id === q.correctAnswer) &&
    typeof q.explanation === 'string' && q.explanation.length > 0;
}

// Filtering
function filterQuestions(bank, section, difficulty) {
  return bank.filter(q => q.section === section && (!difficulty || q.difficulty === difficulty));
}

// Fisher-Yates shuffle
function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Shuffle that keeps passageGroup questions together and in order
function shuffleWithGroups(questions) {
  const grouped = [];
  const standalone = [];
  const seen = new Set();

  for (const q of questions) {
    if (q.passageGroup && !seen.has(q.passageGroup)) {
      seen.add(q.passageGroup);
      const group = questions.filter(x => x.passageGroup === q.passageGroup);
      grouped.push(group);
    } else if (!q.passageGroup) {
      standalone.push([q]);
    }
  }

  const units = [...grouped, ...standalone];
  // Shuffle the units (each unit is a group or single question)
  for (let i = units.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [units[i], units[j]] = [units[j], units[i]];
  }
  return units.flat();
}

// Non-repetition question selection
function selectSessionQuestions(bank, section, difficulty, count, attempts) {
  const trackingKey = difficulty ? `${section}:${difficulty}` : section;
  const pool = filterQuestions(bank, section, difficulty);
  const attempted = attempts[trackingKey] || [];
  let unattempted = pool.filter(q => !attempted.includes(q.id));

  if (unattempted.length === 0) {
    // Auto-reset
    attempts[trackingKey] = [];
    unattempted = pool;
  }

  // Use group-aware shuffle for verbal RC (keeps passage questions together)
  const hasGroups = unattempted.some(q => q.passageGroup);
  const shuffled = hasGroups ? shuffleWithGroups(unattempted) : shuffle(unattempted);

  if (unattempted.length < count) {
    return { questions: shuffled, needsReset: true, available: unattempted.length };
  }

  // For grouped questions, include complete groups up to count
  if (hasGroups) {
    const result = [];
    const includedGroups = new Set();
    for (const q of shuffled) {
      if (result.length >= count && (!q.passageGroup || !includedGroups.has(q.passageGroup))) break;
      result.push(q);
      if (q.passageGroup) includedGroups.add(q.passageGroup);
    }
    return { questions: result, needsReset: false, available: unattempted.length };
  }

  return { questions: shuffled.slice(0, count), needsReset: false, available: unattempted.length };
}

// Answer evaluation (result stored internally, NOT shown during session)
function evaluateAnswer(question, selectedId) {
  return { correct: selectedId === question.correctAnswer };
}

// Progress indicators
function getProgressIndicators(currentIndex, totalQuestions) {
  return { questionNumber: currentIndex + 1, progressFraction: totalQuestions > 0 ? currentIndex / totalQuestions : 0 };
}

// Timer utilities
function getTimerDuration(section, subsection) {
  if (subsection === 'rc') return 150;  // 2.5 min for RC
  if (subsection === 'cr') return 120;  // 2 min for CR
  if (subsection === 'ds') return 150;  // 2.5 min for DS
  const durations = { 'quant': 120, 'verbal': 120, 'data-insights': 150 };
  return durations[section] || 120;
}

function formatTime(seconds) {
  const abs = Math.abs(Math.round(seconds));
  const m = Math.floor(abs / 60);
  const s = abs % 60;
  const str = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  return seconds < 0 ? `+${str}` : str;
}

function getTimerColor(seconds) {
  if (seconds < 0) return 'overtime';
  if (seconds <= 10) return 'urgent';
  if (seconds <= 30) return 'warning';
  return 'normal';
}

function computeTimeTaken(limit, remaining) {
  return limit - remaining;
}

// Session config validation
function validateSessionConfig(count) {
  return Number.isInteger(count) && count >= 1 && count <= 50;
}

// Score computation
function computeScoreSummary(answers, questions) {
  const qMap = {};
  questions.forEach(q => { qMap[q.id] = q; });

  let correct = 0, incorrect = 0, unanswered = 0, totalTime = 0;
  const diffBreakdown = { easy: {correct:0,total:0}, medium: {correct:0,total:0}, hard: {correct:0,total:0} };

  answers.forEach(a => {
    totalTime += a.timeTaken || 0;
    const q = qMap[a.questionId];
    const diff = q ? q.difficulty : 'medium';
    diffBreakdown[diff].total++;

    if (a.selectedAnswer === null) { unanswered++; }
    else if (a.correct) { correct++; diffBreakdown[diff].correct++; }
    else { incorrect++; }
  });

  const total = answers.length;
  return {
    correct, incorrect, unanswered, total,
    accuracy: total > 0 ? (correct / total) * 100 : 0,
    avgTimeSec: total > 0 ? totalTime / total : 0,
    totalTimeSec: totalTime,
    difficultyBreakdown: diffBreakdown
  };
}

// Review helpers
function getReviewMarker(answer) {
  if (answer.selectedAnswer === null) return 'unanswered';
  return answer.correct ? 'correct' : 'incorrect';
}

function buildReviewItem(answer, question) {
  return {
    questionId: answer.questionId,
    prompt: question.prompt,
    passage: question.passage || null,
    choices: question.choices,
    selectedAnswer: answer.selectedAnswer,
    correctAnswer: question.correctAnswer,
    explanation: question.explanation,
    section: question.section,
    subsection: question.subsection || null,
    difficulty: question.difficulty,
    timeTaken: answer.timeTaken,
    marker: getReviewMarker(answer)
  };
}

// Progress aggregation
function aggregateProgress(sessions) {
  if (!sessions.length) return { totalQuestions: 0, totalTime: 0, accuracy: 0, totalCorrect: 0 };
  const totalQ = sessions.reduce((s, sess) => s + sess.totalQuestions, 0);
  const totalC = sessions.reduce((s, sess) => s + sess.correct, 0);
  const totalT = sessions.reduce((s, sess) => s + sess.totalTimeSec, 0);
  return { totalQuestions: totalQ, totalTime: totalT, accuracy: totalQ > 0 ? (totalC / totalQ) * 100 : 0, totalCorrect: totalC };
}

// Weakest area detection
function findWeakestArea(sessions, minAttempts = 5) {
  const combos = {};
  sessions.forEach(sess => {
    if (!sess.answers) return;
    sess.answers.forEach(a => {
      const q = GMAT_QUESTIONS.find(qq => qq.id === a.questionId);
      if (!q) return;
      const key = `${q.section}:${q.difficulty}`;
      if (!combos[key]) combos[key] = { correct: 0, total: 0, section: q.section, difficulty: q.difficulty };
      combos[key].total++;
      if (a.correct) combos[key].correct++;
    });
  });

  let weakest = null, lowestAcc = Infinity;
  Object.values(combos).forEach(c => {
    if (c.total >= minAttempts) {
      const acc = (c.correct / c.total) * 100;
      if (acc < lowestAcc) { lowestAcc = acc; weakest = c; }
    }
  });
  return weakest;
}

// Attempt tracker helpers
function updateAttemptTracker(tracker, questionId, section, difficulty) {
  const sectionKey = section;
  const diffKey = `${section}:${difficulty}`;
  if (!tracker[sectionKey]) tracker[sectionKey] = [];
  if (!tracker[diffKey]) tracker[diffKey] = [];
  if (!tracker[sectionKey].includes(questionId)) tracker[sectionKey].push(questionId);
  if (!tracker[diffKey].includes(questionId)) tracker[diffKey].push(questionId);
  return tracker;
}

function resetAttemptsIfExhausted(tracker, key, poolSize) {
  if (tracker[key] && tracker[key].length >= poolSize) {
    tracker[key] = [];
    return true;
  }
  return false;
}

function getUnattemptedCount(bank, section, difficulty, tracker) {
  const pool = filterQuestions(bank, section, difficulty);
  const key = difficulty ? `${section}:${difficulty}` : section;
  const attempted = tracker[key] || [];
  return pool.filter(q => !attempted.includes(q.id)).length;
}

// Get wrong questions: questions user got wrong and hasn't subsequently gotten right
function getWrongQuestions(sessions, bank) {
  const lastResult = {};
  const lastWrongTime = {};
  const wrongCount = {};
  sessions.forEach((sess, sIdx) => {
    if (!sess.answers) return;
    sess.answers.forEach(a => {
      lastResult[a.questionId] = { correct: a.correct, selectedAnswer: a.selectedAnswer };
      if (!a.correct && a.selectedAnswer !== null) {
        wrongCount[a.questionId] = (wrongCount[a.questionId] || 0) + 1;
        lastWrongTime[a.questionId] = sIdx; // older sessions = lower index = higher priority
      }
    });
  });

  const wrongIds = Object.entries(lastResult)
    .filter(([id, r]) => !r.correct)
    .map(([id]) => id);

  const bankMap = {};
  bank.forEach(q => { bankMap[q.id] = q; });

  // Spaced repetition: prioritize questions wrong more times and wrong longer ago
  return wrongIds
    .map(id => bankMap[id])
    .filter(Boolean)
    .sort((a, b) => {
      const aAge = sessions.length - (lastWrongTime[a.id] || 0);
      const bAge = sessions.length - (lastWrongTime[b.id] || 0);
      const aScore = (wrongCount[a.id] || 1) * aAge;
      const bScore = (wrongCount[b.id] || 1) * bAge;
      return bScore - aScore; // higher score = higher priority
    });
}

// ═══════════════════════════════════════════════════════════
// SPACED REPETITION
// ═══════════════════════════════════════════════════════════
const SR_INTERVALS = [1, 3, 7]; // days

function getSpacedRepetitionDue(sessions, bank) {
  const now = Date.now();
  const lastWrong = {}; // questionId -> { timestamp, wrongCount }
  const lastCorrect = {}; // questionId -> timestamp

  sessions.forEach(sess => {
    if (!sess.answers || !sess.completedAt) return;
    const ts = new Date(sess.completedAt).getTime();
    sess.answers.forEach(a => {
      if (a.correct) {
        lastCorrect[a.questionId] = ts;
      } else if (a.selectedAnswer !== null) {
        const prev = lastWrong[a.questionId];
        lastWrong[a.questionId] = { timestamp: ts, wrongCount: prev ? prev.wrongCount + 1 : 1 };
      }
    });
  });

  const due = { 1: [], 3: [], 7: [] };
  const bankMap = {};
  bank.forEach(q => { bankMap[q.id] = q; });

  Object.entries(lastWrong).forEach(([qId, info]) => {
    // Skip if user got it right after getting it wrong
    if (lastCorrect[qId] && lastCorrect[qId] > info.timestamp) return;
    const daysSince = (now - info.timestamp) / (1000 * 60 * 60 * 24);
    const q = bankMap[qId];
    if (!q) return;
    for (const interval of SR_INTERVALS) {
      if (daysSince >= interval) {
        due[interval].push(q);
      }
    }
  });
  return due;
}

function getTotalSRDue(srDue) {
  // Unique questions due (7-day bucket includes all)
  const seen = new Set();
  [7, 3, 1].forEach(d => srDue[d].forEach(q => seen.add(q.id)));
  return seen.size;
}

function getSRQuestions(srDue) {
  const seen = new Set();
  const result = [];
  // Prioritize longest overdue first
  [7, 3, 1].forEach(d => {
    srDue[d].forEach(q => {
      if (!seen.has(q.id)) { seen.add(q.id); result.push(q); }
    });
  });
  return result;
}

// ═══════════════════════════════════════════════════════════
// STREAK TRACKING
// ═══════════════════════════════════════════════════════════
function getDateKey(date) {
  return date.toISOString().slice(0, 10);
}

function computeStreak(sessions) {
  if (!sessions.length) return { current: 0, best: 0, activeDays: new Set(), todayCount: 0 };

  const activeDays = new Set();
  sessions.forEach(s => {
    if (s.completedAt) activeDays.add(getDateKey(new Date(s.completedAt)));
  });

  const today = getDateKey(new Date());
  const todayCount = sessions.filter(s => s.completedAt && getDateKey(new Date(s.completedAt)) === today).length;

  // Current streak
  let current = 0;
  const d = new Date();
  // Check if today has activity, if not start from yesterday
  if (!activeDays.has(getDateKey(d))) {
    d.setDate(d.getDate() - 1);
  }
  while (activeDays.has(getDateKey(d))) {
    current++;
    d.setDate(d.getDate() - 1);
  }

  // Best streak
  const sorted = [...activeDays].sort();
  let best = 0, run = 1;
  for (let i = 1; i < sorted.length; i++) {
    const prev = new Date(sorted[i - 1]);
    const curr = new Date(sorted[i]);
    const diff = (curr - prev) / (1000 * 60 * 60 * 24);
    if (diff === 1) { run++; } else { run = 1; }
    if (run > best) best = run;
  }
  if (sorted.length === 1) best = 1;
  if (run > best) best = run;

  return { current, best, activeDays, todayCount };
}

function getLast14Days() {
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(getDateKey(d));
  }
  return days;
}

// ═══════════════════════════════════════════════════════════
// WEAK TOPIC DRILL-DOWN
// ═══════════════════════════════════════════════════════════
const SUBTOPIC_NAMES = {
  'quant:easy': 'Quant — Easy',
  'quant:medium': 'Quant — Medium',
  'quant:hard': 'Quant — Hard',
  'verbal:rc:easy': 'Reading Comp — Easy',
  'verbal:rc:medium': 'Reading Comp — Medium',
  'verbal:rc:hard': 'Reading Comp — Hard',
  'verbal:cr:easy': 'Critical Reasoning — Easy',
  'verbal:cr:medium': 'Critical Reasoning — Medium',
  'verbal:cr:hard': 'Critical Reasoning — Hard',
  'data-insights:ds:easy': 'Data Sufficiency — Easy',
  'data-insights:ds:medium': 'Data Sufficiency — Medium',
  'data-insights:ds:hard': 'Data Sufficiency — Hard',
};

function getWeakTopics(sessions, bank, minAttempts = 3) {
  const topics = {};

  sessions.forEach(sess => {
    if (!sess.answers) return;
    sess.answers.forEach(a => {
      const q = bank.find(x => x.id === a.questionId);
      if (!q) return;
      const key = q.subsection ? `${q.section}:${q.subsection}:${q.difficulty}` : `${q.section}:${q.difficulty}`;
      if (!topics[key]) topics[key] = { key, section: q.section, subsection: q.subsection || null, difficulty: q.difficulty, total: 0, correct: 0 };
      topics[key].total++;
      if (a.correct) topics[key].correct++;
    });
  });

  return Object.values(topics)
    .filter(t => t.total >= minAttempts)
    .map(t => ({ ...t, accuracy: (t.correct / t.total) * 100, name: SUBTOPIC_NAMES[t.key] || t.key }))
    .sort((a, b) => a.accuracy - b.accuracy);
}

function getTopicQuestions(bank, section, subsection, difficulty) {
  return bank.filter(q => q.section === section && q.difficulty === difficulty && (subsection ? q.subsection === subsection : true));
}

// EXPORT PROGRESS REPORT
// ═══════════════════════════════════════════════════════════
function generateReportText(sessions, bank, streak) {
  const agg = aggregateProgress(sessions);
  const weakTopics = getWeakTopics(sessions, bank);
  const lines = [];
  lines.push('GMAT PRACTICE — PROGRESS REPORT');
  lines.push('Generated: ' + new Date().toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' }));
  lines.push('');
  lines.push('═══ OVERVIEW ═══');
  lines.push(`Sessions: ${agg.totalSessions}`);
  lines.push(`Questions Attempted: ${agg.totalQuestions}`);
  lines.push(`Overall Accuracy: ${agg.totalQuestions > 0 ? ((agg.totalCorrect / agg.totalQuestions) * 100).toFixed(1) : 0}%`);
  lines.push(`Current Streak: ${streak.current} day${streak.current !== 1 ? 's' : ''}`);
  lines.push(`Best Streak: ${streak.best} day${streak.best !== 1 ? 's' : ''}`);
  lines.push('');

  // Section breakdown
  const bySection = {};
  sessions.forEach(s => {
    if (!s.answers) return;
    s.answers.forEach(a => {
      const q = bank.find(x => x.id === a.questionId);
      if (!q) return;
      if (!bySection[q.section]) bySection[q.section] = { total: 0, correct: 0 };
      bySection[q.section].total++;
      if (a.correct) bySection[q.section].correct++;
    });
  });
  lines.push('═══ BY SECTION ═══');
  Object.entries(bySection).forEach(([sec, d]) => {
    const pct = d.total > 0 ? ((d.correct / d.total) * 100).toFixed(1) : '0.0';
    lines.push(`${SECTION_NAMES[sec] || sec}: ${pct}% (${d.correct}/${d.total})`);
  });
  lines.push('');

  if (weakTopics.length > 0) {
    lines.push('═══ WEAK AREAS ═══');
    weakTopics.slice(0, 5).forEach(t => {
      lines.push(`${t.name}: ${t.accuracy.toFixed(1)}% (${t.correct}/${t.total})`);
    });
    lines.push('');
  }

  // Last 5 sessions
  const recent = sessions.slice(-5).reverse();
  if (recent.length > 0) {
    lines.push('═══ RECENT SESSIONS ═══');
    recent.forEach((s, i) => {
      const date = s.completedAt ? new Date(s.completedAt).toLocaleDateString(undefined, { month:'short', day:'numeric' }) : '—';
      const scoreInfo = s.isAdaptive ? ` · Score: ${s.sectionScore}/90 (${s.percentile}th pct)` : '';
      lines.push(`${date} — ${SECTION_NAMES[s.section] || s.section}: ${s.accuracy.toFixed(1)}% (${s.correct}/${s.totalQuestions})${scoreInfo}`);
    });
  }

  return lines.join('\n');
}

function downloadReport(text) {
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gmat-progress-${getDateKey(new Date())}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// --- Confetti ---
function Confetti() {
  const colors = ['#00e88f','#6c63ff','#00d4ff','#ff6b6b','#ffd93d','#ff9ff3','#54a0ff'];
  const pieces = Array.from({length: 60}, (_, i) => ({
    id: i, left: Math.random() * 100, delay: Math.random() * 2, dur: 2 + Math.random() * 2,
    color: colors[i % colors.length], size: 6 + Math.random() * 8, rot: Math.random() * 360
  }));
  return (
    <div className="confetti-wrap">
      {pieces.map(p => <div key={p.id} className="confetti-piece" style={{
        left: p.left + '%', background: p.color, width: p.size, height: p.size,
        animationDelay: p.delay + 's', animationDuration: p.dur + 's',
        transform: `rotate(${p.rot}deg)`
      }} />)}
    </div>
  );
}

// --- ScoreSummaryView ---
function ScoreSummaryView({ session, questions, onReview, onNewSession, sessions }) {
  const { correct, incorrect, unanswered, accuracy, avgTimeSec, totalTimeSec, difficultyBreakdown } = session;
  const isAdaptive = session.isAdaptive;

  // Time analysis: avg time on correct vs incorrect
  const answers = session.answers || [];
  const correctTimes = answers.filter(a => a.correct && a.timeTaken).map(a => a.timeTaken);
  const incorrectTimes = answers.filter(a => a.selectedAnswer !== null && !a.correct && a.timeTaken).map(a => a.timeTaken);
  const avgCorrectTime = correctTimes.length ? correctTimes.reduce((a,b) => a+b, 0) / correctTimes.length : 0;
  const avgIncorrectTime = incorrectTimes.length ? incorrectTimes.reduce((a,b) => a+b, 0) / incorrectTimes.length : 0;
  const showConfetti = isAdaptive ? (session.sectionScore >= 80) : (accuracy >= 80);

  // Cinematic score counter for adaptive
  const [revealScore, setRevealScore] = useState(0);
  const [revealDone, setRevealDone] = useState(false);
  useEffect(() => {
    if (!isAdaptive) return;
    const target = session.sectionScore;
    const delay = setTimeout(() => {
      const duration = 1500;
      const start = performance.now();
      const tick = (now) => {
        const p = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        setRevealScore(Math.round(eased * target));
        if (p < 1) requestAnimationFrame(tick);
        else setRevealDone(true);
      };
      requestAnimationFrame(tick);
    }, 800);
    return () => clearTimeout(delay);
  }, [isAdaptive, session.sectionScore]);

  // Theta chart ref
  const chartRef = useRef(null);
  useEffect(() => {
    if (!isAdaptive || !chartRef.current || !session.thetaHistory) return;
    const canvas = chartRef.current;
    const ctx = canvas.getContext('2d');
    const hist = session.thetaHistory;
    const w = canvas.width = canvas.offsetWidth * 2;
    const h = canvas.height = canvas.offsetHeight * 2;
    ctx.scale(2, 2);
    const cw = w / 2, ch = h / 2;
    const pad = { t: 20, b: 30, l: 40, r: 20 };
    const pw = cw - pad.l - pad.r, ph = ch - pad.t - pad.b;
    const minT = -3.5, maxT = 3.5;

    ctx.clearRect(0, 0, cw, ch);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.5;
    for (let v = -3; v <= 3; v++) {
      const y = pad.t + ph - ((v - minT) / (maxT - minT)) * ph;
      ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + pw, y); ctx.stroke();
    }

    // Zero line
    const zeroY = pad.t + ph - ((0 - minT) / (maxT - minT)) * ph;
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(pad.l, zeroY); ctx.lineTo(pad.l + pw, zeroY); ctx.stroke();
    ctx.setLineDash([]);

    // Theta line
    if (hist.length > 1) {
      const grad = ctx.createLinearGradient(pad.l, 0, pad.l + pw, 0);
      grad.addColorStop(0, '#6c63ff');
      grad.addColorStop(1, '#00d4ff');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      for (let i = 0; i < hist.length; i++) {
        const x = pad.l + (i / (hist.length - 1)) * pw;
        const y = pad.t + ph - ((hist[i] - minT) / (maxT - minT)) * ph;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Dots
      for (let i = 0; i < hist.length; i++) {
        const x = pad.l + (i / (hist.length - 1)) * pw;
        const y = pad.t + ph - ((hist[i] - minT) / (maxT - minT)) * ph;
        ctx.fillStyle = i === hist.length - 1 ? '#00d4ff' : '#6c63ff';
        ctx.beginPath(); ctx.arc(x, y, i === hist.length - 1 ? 4 : 2.5, 0, Math.PI * 2); ctx.fill();
      }
    }

    // Labels
    ctx.fillStyle = '#8b92a5';
    ctx.font = '10px "Space Grotesk"';
    ctx.textAlign = 'center';
    ctx.fillText('Q1', pad.l, ch - 8);
    ctx.fillText(`Q${hist.length - 1}`, pad.l + pw, ch - 8);
    ctx.textAlign = 'right';
    ctx.fillText('High', pad.l - 6, pad.t + 4);
    ctx.fillText('Low', pad.l - 6, pad.t + ph + 4);
  }, [isAdaptive, session.thetaHistory]);

  return (
    <div>
      {!isAdaptive && showConfetti && <Confetti />}
      <div className="hub-title" style={{marginBottom:'24px'}}>
        <h1>Session Complete</h1>
        <p>{SECTION_NAMES[session.section] || (session.section === 'mixed' ? 'Retry Wrong Questions' : session.section)} — {session.totalQuestions} questions{isAdaptive ? ' (Adaptive)' : ''}</p>
      </div>

      {/* GMAT Score Card for adaptive sessions */}
      {isAdaptive && (
        <div className="score-reveal score-confetti-trigger">
          {revealDone && showConfetti && <Confetti />}
          <div className="score-reveal-blur">
            <div className="score-reveal-number">{revealScore}</div>
            <div className="score-reveal-label">Estimated Section Score</div>
          </div>
          <div className="score-reveal-pct">{session.percentile}th percentile</div>
          <div className="score-reveal-section">{SECTION_NAMES[session.section]} · {session.totalQuestions} questions</div>
        </div>
      )}

      {/* Theta progression chart */}
      {isAdaptive && session.thetaHistory && session.thetaHistory.length > 2 && (
        <div className="card summary-reveal" style={{marginBottom:'16px'}}>
          <div className="card-title">Ability Progression</div>
          <canvas ref={chartRef} style={{width:'100%',height:'160px',display:'block'}} />
          <div style={{fontSize:'.72rem',color:'var(--text-s)',marginTop:'8px',textAlign:'center'}}>
            How the test adapted to your ability level question by question
          </div>
        </div>
      )}

      <div className="summary-grid">
        <div className="summary-card summary-reveal" style={{borderColor:'rgba(0,232,143,.25)'}}>
          <span className="s-label">Correct</span>
          <span className="s-value" style={{color:'var(--green)'}}>{correct}</span>
        </div>
        <div className="summary-card summary-reveal" style={{borderColor:'rgba(255,107,107,.25)'}}>
          <span className="s-label">Incorrect</span>
          <span className="s-value" style={{color:'var(--warm)'}}>{incorrect}</span>
        </div>
        <div className="summary-card summary-reveal" style={{borderColor:'var(--border)'}}>
          <span className="s-label">Unanswered</span>
          <span className="s-value" style={{color:'var(--text-s)'}}>{unanswered}</span>
        </div>
        <div className="summary-card summary-reveal" style={{borderColor:'rgba(108,99,255,.3)'}}>
          <span className="s-label">Accuracy</span>
          <span className="s-value big" style={{color:'var(--accent-l)'}}>{accuracy.toFixed(1)}%</span>
        </div>
      </div>

      <div className="card summary-reveal" style={{marginBottom:'16px'}}>
        <div className="card-title">Time</div>
        <div className="b-row">
          <span className="b-label">Average per question</span>
          <span className="b-val">{formatTime(Math.round(avgTimeSec))}</span>
        </div>
        <div className="b-row">
          <span className="b-label">Total session duration</span>
          <span className="b-val">{formatTime(Math.round(totalTimeSec))}</span>
        </div>
        <div className="time-comparison">
          <div className="time-stat">
            <div className="time-stat-label">Avg on Correct</div>
            <div className="time-stat-value" style={{color:'var(--green)'}}>{correctTimes.length ? formatTime(Math.round(avgCorrectTime)) : '—'}</div>
          </div>
          <div className="time-stat">
            <div className="time-stat-label">Avg on Incorrect</div>
            <div className="time-stat-value" style={{color:'var(--warm)'}}>{incorrectTimes.length ? formatTime(Math.round(avgIncorrectTime)) : '—'}</div>
          </div>
        </div>
      </div>

      <div className="card summary-reveal" style={{marginBottom:'16px'}}>
        <div className="card-title">Difficulty Breakdown</div>
        {['easy','medium','hard'].map(diff => {
          const d = difficultyBreakdown[diff];
          const pct = d.total > 0 ? (d.correct / d.total) * 100 : 0;
          return (
            <div key={diff} className="b-row" style={{flexDirection:'column',alignItems:'stretch',gap:'4px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span className="b-label" style={{textTransform:'capitalize'}}>{diff}</span>
                <span className="b-val">{d.correct}/{d.total}</span>
              </div>
              <div className="breakdown-bar-wrap">
                <div className={`breakdown-bar-fill ${diff}`} style={{width:`${pct}%`}} />
              </div>
            </div>
          );
        })}
      </div>

      <button className="calc-btn" onClick={onReview} style={{marginBottom:'12px'}}>Review All Questions</button>
      <button className="calc-btn" onClick={onNewSession} style={{background:'var(--surface)',color:'var(--text)',border:'1px solid var(--border)',boxShadow:'none',marginBottom:'12px'}}>New Session</button>
      <button className="export-btn" onClick={() => {
        const streak = computeStreak(sessions || []);
        const text = generateReportText(sessions || [], questions, streak);
        downloadReport(text);
      }} style={{width:'100%',justifyContent:'center'}}>📄 Export Progress Report</button>
    </div>
  );
}

// --- AccuracyChart ---
function AccuracyChart({ sessions }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;

    ctx.clearRect(0, 0, W, H);

    const recent = sessions.slice(-10);
    if (recent.length === 0) return;

    const pad = { top: 20, right: 16, bottom: 30, left: 40 };
    const chartW = W - pad.left - pad.right;
    const chartH = H - pad.top - pad.bottom;
    const barW = Math.min(32, (chartW / recent.length) * 0.6);
    const gap = chartW / recent.length;

    // Y-axis labels
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-s').trim() || '#8b92a5';
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.textAlign = 'right';
    for (let i = 0; i <= 4; i++) {
      const val = i * 25;
      const y = pad.top + chartH - (val / 100) * chartH;
      ctx.fillText(val + '%', pad.left - 6, y + 4);
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(pad.left, y);
      ctx.lineTo(W - pad.right, y);
      ctx.stroke();
    }

    // Bars
    const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#6c63ff';
    recent.forEach((s, i) => {
      const x = pad.left + i * gap + (gap - barW) / 2;
      const barH = (s.accuracy / 100) * chartH;
      const y = pad.top + chartH - barH;

      ctx.fillStyle = accentColor;
      ctx.beginPath();
      const r = 3;
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + barW - r, y);
      ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
      ctx.lineTo(x + barW, pad.top + chartH);
      ctx.lineTo(x, pad.top + chartH);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.fill();

      // X-axis label
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-s').trim() || '#8b92a5';
      ctx.font = '10px JetBrains Mono, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('#' + (sessions.length - recent.length + i + 1), x + barW / 2, pad.top + chartH + 16);
    });
  }, [sessions]);

  return <canvas ref={canvasRef} style={{width:'100%',height:'200px'}} />;
}

        {Object.entries(sectionStats).map(([sec, stats]) => {
          const acc = stats.total > 0 ? ((stats.correct / stats.total) * 100).toFixed(1) : '0.0';
          return (
            <div key={sec} className="section-breakdown-card">
              <h4>{SECTION_ICONS[sec] || ''} {SECTION_NAMES[sec] || sec}</h4>
              <div className="sb-stat">{stats.total} questions attempted</div>
              <div className="sb-stat">Accuracy: <strong style={{color:'var(--text)'}}>{acc}%</strong></div>
            </div>
          );
        })}
      </div>

      <div className="session-history">
        <h3>Recent Sessions</h3>
        {recentSessions.map(s => {
          const dateStr = s.completedAt ? new Date(s.completedAt).toLocaleDateString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
          return (
            <div key={s.id} className="session-item">
              <div className="si-left">
                <span className="si-section">{SECTION_ICONS[s.section] || ''} {SECTION_NAMES[s.section] || s.section}</span>
                <span className="si-diff">{s.difficulty === 'adaptive' ? '🎯 Adaptive' : s.difficulty || 'All'}</span>
              </div>
              <div className="si-right">
                {s.isAdaptive && <span style={{fontFamily:'var(--mono)',fontWeight:600,color:'var(--accent-l)'}}>{s.sectionScore}</span>}
                <span className="si-acc">{s.accuracy.toFixed(0)}%</span>
                <span>{dateStr}</span>
              </div>
            </div>
          );
        })}
      </div>

      <button className="export-btn" onClick={() => {
        const streak = computeStreak(sessions);
        const text = generateReportText(sessions, typeof GMAT_QUESTIONS !== 'undefined' ? GMAT_QUESTIONS : [], streak);
        downloadReport(text);
      }} style={{width:'100%',justifyContent:'center',marginTop:'16px'}}>📄 Export Progress Report</button>
    </div>
  );
}
